plugins {
    id 'java'
    id 'io.freefair.lombok' version '9.4.0'
    id 'uk.gov.laa.springboot.laa-spring-boot-gradle-plugin'
}

repositories {
    mavenCentral()
}


java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}
//[https://security.snyk.io/vuln/SNYK-JAVA-ORGPOSTGRESQL-17874248] in org.postgresql:postgresql@42.7.11 introduced by org.postgresql:postgresql@42.7.11
ext['postgresql.version'] = '42.7.12'

dependencies {
    implementation project(':data-access-service')
    implementation project(path: ':data-access-service', configuration: 'testUtilitiesRuntimeElements')

    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-webflux'
    implementation 'net.datafaker:datafaker:2.5.2'

    runtimeOnly 'org.postgresql:postgresql'
    runtimeOnly 'org.flywaydb:flyway-database-postgresql'
}

springBoot {
    mainClass = 'uk.gov.justice.laa.dstew.access.massgenerator.MassGeneratorApp'
}

bootJar {
    enabled = true
    mainClass = 'uk.gov.justice.laa.dstew.access.massgenerator.MassGeneratorApp'
}

bootRun {
    mainClass = 'uk.gov.justice.laa.dstew.access.massgenerator.MassGeneratorApp'
}

jar {
    enabled = false
}

// Mass-generator is a standalone utility with generated-style source that does not fit the
// repository-wide Checkstyle rules, so exclude it from Checkstyle enforcement.
checkstyleMain.exclude("*")

