plugins {
    id 'java'
    id 'io.freefair.lombok' version '9.5.0'
    id 'org.springframework.boot' version '4.0.6'
    id 'io.spring.dependency-management' version '1.1.7'
}

repositories {
    mavenCentral()
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.boot:spring-boot-dependencies:4.0.6"
    }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

configurations.all {
    resolutionStrategy {
        force 'com.fasterxml.jackson.core:jackson-core:2.21.3'
        force 'com.fasterxml.jackson.core:jackson-databind:2.21.3'
    }
}

dependencies {
    implementation project(':data-access-service')
    implementation project(path: ':data-access-service', configuration: 'testUtilitiesRuntimeElements')

    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-webflux'
    implementation 'net.datafaker:datafaker:2.5.4'

    runtimeOnly 'org.postgresql:postgresql'
    runtimeOnly 'org.flywaydb:flyway-database-postgresql'
}

springBoot {
    mainClass = 'uk.gov.justice.laa.dstew.access.massgenerator.MassGeneratorApp'
}

bootJar {
    enabled = true
    mainClass = 'uk.gov.justice.laa.dstew.access.massgenerator.MassGeneratorApp'
}

bootRun {
    mainClass = 'uk.gov.justice.laa.dstew.access.massgenerator.MassGeneratorApp'
}

jar {
    enabled = false
}



