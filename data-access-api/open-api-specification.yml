openapi: "3.0.0"
info:
  title: Applications API
  version: 1.0.0

security:
  - bearerAuth: []

paths:
  /api/v0/applications:
    $ref: "./open-api-application-specification.yml#/paths/~1api~1v0~1applications"
  /api/v0/applications/{id}:
    $ref: "./open-api-application-specification.yml#/paths/~1api~1v0~1applications~1{id}"
  /api/v0/caseworkers:
    $ref: "./open-api-application-specification.yml#/paths/~1api~1v0~1caseworkers"
  /api/v0/applications/assign:
    $ref: "./open-api-application-specification.yml#/paths/~1api~1v0~1applications~1assign"
  /api/v0/applications/{id}/unassign:
    $ref: "./open-api-application-specification.yml#/paths/~1api~1v0~1applications~1{id}~1unassign"
  /api/v0/applications/{id}/history-search:
    $ref: "./open-api-application-specification.yml#/paths/~1api~1v0~1applications~1{id}~1history-search"
  /api/v0/applications/{id}/decision:
    $ref: "./open-api-application-specification.yml#/paths/~1api~1v0~1applications~1{id}~1decision"
  /api/v0/applications/{id}/certificate:
    $ref: "./open-api-application-specification.yml#/paths/~1api~1v0~1applications~1{id}~1certificate"
  /api/v0/individuals:
    $ref: "./open-api-application-specification.yml#/paths/~1api~1v0~1individuals"
  /api/v0/applications/{id}/notes:
    $ref: "./open-api-application-specification.yml#/paths/~1api~1v0~1applications~1{id}~1notes"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApplicationResponse:
      $ref: "./open-api-application-specification.yml#/components/schemas/ApplicationResponse"
    ApplicationCreateRequest:
      $ref: "./open-api-application-specification.yml#/components/schemas/ApplicationCreateRequest"
    ApplicationUpdateRequest:
      $ref: "./open-api-application-specification.yml#/components/schemas/ApplicationUpdateRequest"
    ApplicationSummaryResponse:
      $ref: "./open-api-application-specification.yml#/components/schemas/ApplicationSummaryResponse"
    ApplicationSummary:
      $ref: "./open-api-application-specification.yml#/components/schemas/ApplicationSummary"
    CaseworkerResponse:
      $ref: "./open-api-application-specification.yml#/components/schemas/CaseworkerResponse"
    CaseworkersResponse:
      $ref: "./open-api-application-specification.yml#/components/schemas/CaseworkersResponse"
    CaseworkerAssignRequest:
      $ref: "./open-api-application-specification.yml#/components/schemas/CaseworkerAssignRequest"
    ApplicationDomainEventResponse:
      $ref: "./open-api-application-specification.yml#/components/schemas/ApplicationDomainEventResponse"
    PagingResponse:
      $ref: "./open-api-application-specification.yml#/components/schemas/PagingResponse"
    MakeDecisionRequest:
      $ref: "./open-api-application-specification.yml#/components/schemas/MakeDecisionRequest"
    IndividualResponse:
      $ref: "./open-api-application-specification.yml#/components/schemas/IndividualResponse"
    IndividualsResponse:
      $ref: "./open-api-application-specification.yml#/components/schemas/IndividualsResponse"
    CreateNoteRequest:
      $ref: "./open-api-application-specification.yml#/components/schemas/CreateNoteRequest"
