openapi: "3.0.0"
info:
  title: Applications API
  version: 1.0.0

security:
  - bearerAuth: []

paths:
  /api/v0/applications:
    $ref: "./open-api-applications/resources.yml#/paths/~1api~1v0~1applications"
  /api/v0/applications/{id}:
    $ref: "./open-api-applications/resources.yml#/paths/~1api~1v0~1applications~1{id}"
  /api/v0/caseworkers:
    $ref: "./open-api-caseworkers/resources.yml#/paths/~1api~1v0~1caseworkers"
  /api/v0/applications/assign:
    $ref: "./open-api-applications/resources.yml#/paths/~1api~1v0~1applications~1assign"
  /api/v0/applications/{id}/unassign:
    $ref: "./open-api-applications/resources.yml#/paths/~1api~1v0~1applications~1{id}~1unassign"
  /api/v0/applications/{id}/history-search:
    $ref: "./open-api-applications/resources.yml#/paths/~1api~1v0~1applications~1{id}~1history-search"
  /api/v0/applications/{id}/decision:
    $ref: "./open-api-applications/resources.yml#/paths/~1api~1v0~1applications~1{id}~1decision"
  /api/v0/applications/{id}/certificate:
    $ref: "./open-api-applications/resources.yml#/paths/~1api~1v0~1applications~1{id}~1certificate"
  /api/v0/individuals:
    $ref: "./open-api-individuals/resources.yml#/paths/~1api~1v0~1individuals"
  /api/v0/applications/{id}/notes:
    $ref: "./open-api-applications/resources.yml#/paths/~1api~1v0~1applications~1{id}~1notes"
  /api/v0/applications/{id}/upload-document:
    $ref: "./open-api-applications/resources.yml#/paths/~1api~1v0~1applications~1{id}~1upload-document"
  /api/v0/applications/{id}/download-document/{documentId}:
    $ref: "./open-api-applications/resources.yml#/paths/~1api~1v0~1applications~1{id}~1download-document~1{documentId}"
  /api/v0/applications/{id}/update-document:
    $ref: "./open-api-applications/resources.yml#/paths/~1api~1v0~1applications~1{id}~1update-document"
  /api/v0/applications/{id}/delete-document:
    $ref: "./open-api-applications/resources.yml#/paths/~1api~1v0~1applications~1{id}~1delete-document"
  /api/v0/sds/health:
    $ref: "./open-api-applications/resources.yml#/paths/~1api~1v0~1sds~1health"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApplicationResponse:
      $ref: "./open-api-applications/components.yml#/components/schemas/ApplicationResponse"
    ApplicationCreateRequest:
      $ref: "./open-api-applications/components.yml#/components/schemas/ApplicationCreateRequest"
    ApplicationUpdateRequest:
      $ref: "./open-api-applications/components.yml#/components/schemas/ApplicationUpdateRequest"
    ApplicationSummaryResponse:
      $ref: "./open-api-applications/components.yml#/components/schemas/ApplicationSummaryResponse"
    ApplicationSummary:
      $ref: "./open-api-applications/components.yml#/components/schemas/ApplicationSummary"
    CaseworkerResponse:
      $ref: "./open-api-caseworkers/components.yml#/components/schemas/CaseworkerResponse"
    CaseworkersResponse:
      $ref: "./open-api-caseworkers/components.yml#/components/schemas/CaseworkersResponse"
    CaseworkerAssignRequest:
      $ref: "./open-api-caseworkers/components.yml#/components/schemas/CaseworkerAssignRequest"
    ApplicationDomainEventResponse:
      $ref: "./open-api-applications/components.yml#/components/schemas/ApplicationDomainEventResponse"
    PagingResponse:
      $ref: "./open-api-common/components.yml#/components/schemas/PagingResponse"
    MakeDecisionRequest:
      $ref: "./open-api-applications/components.yml#/components/schemas/MakeDecisionRequest"
    IndividualResponse:
      $ref: "./open-api-individuals/components.yml#/components/schemas/IndividualResponse"
    IndividualsResponse:
      $ref: "./open-api-individuals/components.yml#/components/schemas/IndividualsResponse"
    CreateNoteRequest:
      $ref: "./open-api-applications/components.yml#/components/schemas/CreateNoteRequest"
    ApplicationNoteResponse:
      $ref: "./open-api-applications/components.yml#/components/schemas/ApplicationNoteResponse"
    ApplicationNotesResponse:
      $ref: "./open-api-applications/components.yml#/components/schemas/ApplicationNotesResponse"
    DocumentUploadResponse:
      $ref: "./open-api-applications/components.yml#/components/schemas/DocumentUploadResponse"
    DocumentDownloadResponse:
      $ref: "./open-api-applications/components.yml#/components/schemas/DocumentDownloadResponse"
    DocumentUpdateResponse:
      $ref: "./open-api-applications/components.yml#/components/schemas/DocumentUpdateResponse"
    SdsHealthResponse:
      $ref: "./open-api-applications/components.yml#/components/schemas/SdsHealthResponse"
