paths:
  /api/v0/individuals:
    get:
      tags:
        - individuals
      summary: Get a list of individuals matching search criteria
      operationId: getIndividuals
      parameters:
        - $ref: "../open-api-common/components.yml#/components/parameters/XServiceName"
        - name: include
          in: query
          description: determines additional data in the response
          schema:
            $ref: "./components.yml#/components/schemas/IncludedAdditionalData"
        - name: page
          in: query
          description: Page number of data to be returned (defaults to 1)
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          description: Number of individuals in a page (defaults to 20)
          schema:
            type: integer
            default: 20
        - name: applicationId
          in: query
          description: The ID of the application the individuals are linked to
          schema:
            type: string
            format: uuid
        - name: individualType
          in: query
          description: The type of the individual
          schema:
            $ref: "./components.yml#/components/schemas/IndividualType"
      responses:
        '200':
          description: 'Success'
          content:
            application/json:
              schema:
                $ref: "./components.yml#/components/schemas/IndividualsResponse"
        '400': { description: Bad request }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '500': { description: Internal server error }
