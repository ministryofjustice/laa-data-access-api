openapi: "3.0.0"
info:
  version: 1.0.0
  title: Applications API

components:
  schemas:
    BaseApplicationContent:
      description: "Test"
      oneOf:
        - $ref: '#/components/schemas/applyApplication'
        - $ref: '#/components/schemas/decideApplication'
      discriminator:
        propertyName: objectType
        mapping:
          simple: '#/components/schemas/applyApplication'
          complex: '#/components/schemas/decideApplication'

    applyApplication:
      type: object
      required:
        - objectType
        - id
        - submittedAt
      properties:
        objectType:
          type: string
        id:
          type: string
          format: uuid
        submittedAt:
          type: string
          format: date-time
      additionalProperties: true

    decideApplication:
      allOf:
        - $ref: '#/components/schemas/applyApplication'
        - type: object
          required:
            - proceedings
          properties:
            proceedings:
              $ref: '#/components/schemas/proceedings'
          additionalProperties: true

    proceedings:
      type: array
      minItems: 1
      items:
        $ref: '#/components/schemas/proceeding'

    proceeding:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
      additionalProperties: true