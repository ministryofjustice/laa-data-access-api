services:
  postgres-smoketest:
    image: postgres:17
    container_name: laa-postgres-smoketest
    restart: unless-stopped
    ports:
      - "6432:5432"
    environment:
      POSTGRES_DB: laa_data_access_api
      POSTGRES_USER: laa_user
      POSTGRES_PASSWORD: laa_password
    volumes:
      - pgdata-smoketest:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laa_user -d laa_data_access_api"]
      interval: 10s
      timeout: 5s
      retries: 5

  app-smoketest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laa-data-access-api-smoketest
    restart: unless-stopped
    ports:
      - "9000:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-smoketest:5432/laa_data_access_api
      SPRING_DATASOURCE_USERNAME: laa_user
      SPRING_DATASOURCE_PASSWORD: laa_password
      # Entra / OAuth2 — set these in your shell or a .env file before running
      ENTRA_ISSUER_URI: ${ENTRA_ISSUER_URI:-https://dummy-issuer}
      ENTRA_JWK_SET_URI: ${ENTRA_JWK_SET_URI:-https://dummy-jwk-set-uri}
      ENTRA_AUD: ${ENTRA_AUD:-dummy-aud}
      # Optional feature flags
      FEATURE_DISABLE_SECURITY: ${FEATURE_DISABLE_SECURITY:-false}
      # Sentry (disabled locally by default)
      SENTRY_ENABLED: ${SENTRY_ENABLED:-false}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-local}
    depends_on:
      postgres-smoketest:
        condition: service_healthy

volumes:
  pgdata-smoketest:

