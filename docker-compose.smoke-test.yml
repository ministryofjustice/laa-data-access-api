services:
  postgres-smoketest:
    image: postgres:17
    container_name: laa-postgres-smoketest
    restart: unless-stopped
    ports:
      - "6432:5432"
    environment:
      POSTGRES_DB: laa_data_access_api
      POSTGRES_USER: laa_user
      POSTGRES_PASSWORD: laa_password
    volumes:
      - pgdata-smoketest:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laa_user -d laa_data_access_api"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-oauth2-server-smoketest:
    # Version: 2.1.10 (also update: docker-compose.yml, build.gradle testImplementation)
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    container_name: laa-mock-oauth2-smoketest
    restart: unless-stopped
    ports:
      - "9998:9999"
    environment:
      SERVER_PORT: 9999
      JSON_CONFIG: >
        {
          "interactiveLogin": false,
          "tokenCallbacks": [
            {
              "issuerId": "entra",
              "tokenExpiry": 3600,
              "requestMappings": [
                {
                  "requestParam": "grant_type",
                  "match": "client_credentials",
                  "claims": {
                    "sub": "smoke-test-user",
                    "aud": ["laa-data-access-api"],
                    "roles": ["LAA_CASEWORKER"],
                    "LAA_APP_ROLES": "LAA_CASEWORKER"
                  }
                }
              ]
            }
          ]
        }
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9999/entra/jwks || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  app-smoketest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laa-data-access-api-smoketest
    restart: unless-stopped
    ports:
      - "9000:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-smoketest:5432/laa_data_access_api
      SPRING_DATASOURCE_USERNAME: laa_user
      SPRING_DATASOURCE_PASSWORD: laa_password
      # Entra / OAuth2 — points to mock-oauth2-server for smoke tests
      ENTRA_ISSUER_URI: http://mock-oauth2-server-smoketest:9999/entra
      ENTRA_JWK_SET_URI: http://mock-oauth2-server-smoketest:9999/entra/jwks
      ENTRA_AUD: laa-data-access-api
      # Sentry (disabled locally by default)
      SENTRY_ENABLED: ${SENTRY_ENABLED:-false}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-local}
    depends_on:
      postgres-smoketest:
        condition: service_healthy
      mock-oauth2-server-smoketest:
        condition: service_healthy

volumes:
  pgdata-smoketest:
