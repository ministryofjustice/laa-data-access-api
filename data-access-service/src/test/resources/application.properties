spring.security.oauth2.resourceserver.jwt.issuer-uri=https://dummy-issuer
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://dummy-jwk
spring.security.oauth2.resourceserver.jwt.audience=dummy-audience

# SDS API test configuration
app.sds-api.url=http://localhost:8080/test-sds-api
app.sds-api.bucket-name=test-bucket
app.sds-api.client-registration-id=test-sds-client-id
app.sds-api.principal-name=test-principal

# OAuth2 client registration for moj-identity
spring.security.oauth2.client.registration.moj-identity.client-id=test-auth-client-id
spring.security.oauth2.client.registration.moj-identity.client-secret=test-auth-client-secret
spring.security.oauth2.client.registration.moj-identity.scope=test-scope
spring.security.oauth2.client.registration.moj-identity.authorization-grant-type=client_credentials
spring.security.oauth2.client.provider.moj-identity.issuer-uri=https://dummy-issuer