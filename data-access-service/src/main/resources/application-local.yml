# Local development profile — uses mock-oauth2-server from docker-compose.
# Usage: ./gradlew bootRun --args='--spring.profiles.active=local'
# Prerequisite: docker-compose up (starts Postgres + mock-oauth2-server)

spring:
  security:
    oauth2:
      client:
        registration:
          moj-identity:
            client-id: test
            client-secret: test
            scope: api://laa-data-access-api/.default
            authorization-grant-type: client_credentials
        provider:
          moj-identity:
            token-uri: http://localhost:9999/entra/token
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9999/entra
          jwk-set-uri: http://localhost:9999/entra/jwks
          audience: laa-data-access-api


# Local profile configuration - overrides for local development
logging:
  # Override structured logging for local development
  structured:
    format:
      console: # Disables structured logging for local development
  pattern:
    console: "%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr{faint} %clr([%15.15t]){faint} %clr([correlationId=%X{correlationId}]){yellow} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"

