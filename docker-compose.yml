services:
  postgres:
    image: postgres:17
    mem_limit: 16834m        # limit RAM to 512 MB
    cpus: 4
    container_name: laa-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: laa_data_access_api
      POSTGRES_USER: laa_user
      POSTGRES_PASSWORD: laa_password
    volumes:
      - pgdata:/var/lib/postgresql/data

  mock-oauth2-server:
    # Version: 2.1.10 (also update: docker-compose.smoke-test.yml, build.gradle integrationTestImplementation)
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    container_name: laa-mock-oauth2
    ports:
      - "9999:9999"
    hostname: host.docker.internal
    environment:
      SERVER_PORT: 9999
      JSON_CONFIG_PATH: /etc/mock-oauth2/config.json
    volumes:
      - ./infra/mock-oauth2/config.json:/etc/mock-oauth2/config.json:ro
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: laa-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:13.1.0
    container_name: laa-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  pgdata: