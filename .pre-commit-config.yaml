# Pre-commit configuration for Java project
repos:
  - repo: local
    hooks:
      - id: gradle-spotless-apply
        name: Gradle Spotless (format)
        entry: ./gradlew
        language: system
        args: [ "spotlessApply" ]
        pass_filenames: false

      - id: checkstyle
        name: Checkstyle
        entry: ./gradlew
        language: system
        args: [ "checkstyleMain", "--quiet" ]
        pass_filenames: false

  # Ministry of Justice DevSecOps hooks for secret detection
  - repo: https://github.com/ministryofjustice/devsecops-hooks
    rev: v1.3.0
    hooks:
      - id: baseline
        # Exclude directories that are not part of the codebase
        exclude: |
          (?x)^(
            build/|
            .gradle/|
            .idea/|
            .git/|
          )
