apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k6-perf.fullname" . }}-scripts
  labels:
    {{- include "k6-perf.labels" . | nindent 4 }}
data:
  # K6 Operator mounts these keys as files into /test/ inside the runner pod.
  # We ship the bundled script (produced by `npm run build` upstream) so the
  # runner only needs a single file with no relative imports to resolve.
  #
  # If you maintain the helm chart by hand, replace the placeholder below with
  # the contents of performance-tests/dist/bundle.js produced by the build step.
{{- $bundle := .Files.Get "scripts/bundle.js" }}
{{- if $bundle }}
  bundle.js: |-
{{ $bundle | indent 4 }}
{{- else }}
  bundle.js: |-
    // Placeholder. Run `npm run build` in performance-tests/ and copy
    // the bundled output into .helm/k6-perf/scripts/bundle.js before
    // installing this chart.
    throw new Error("k6 bundle not provisioned — see .helm/k6-perf/README.md");
{{- end }}
