{{- if and .Values.mockOAuth2 .Values.mockOAuth2.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "data-access-api.fullname" . }}-mock-oauth2-config
  labels:
    {{- include "data-access-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: mock-oauth2
data:
  config.json: |
    {
      "interactiveLogin": false,
      "tokenCallbacks": [
        {
          "issuerId": "entra",
          "tokenExpiry": {{ .Values.mockOAuth2.tokenExpiry | default 3600 }},
          "requestMappings": [
            {
              "requestParam": "grant_type",
              "match": "client_credentials",
              "claims": {
                "sub": "uat-test-user",
                "aud": ["laa-data-access-api"],
                "roles": ["LAA_CASEWORKER"],
                "LAA_APP_ROLES": "LAA_CASEWORKER"
              }
            }
          ]
        }
      ]
    }
{{- end }}
