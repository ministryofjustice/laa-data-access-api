apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-oauth2-server
  namespace: {{ .Release.Namespace }}
  labels:
    app: mock-oauth2-server
    helm.sh/chart: {{ include "data-access-api.chart" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-oauth2-server
  template:
    metadata:
      labels:
        app: mock-oauth2-server
    spec:
      containers:
        - name: mock-oauth2-server
          image: ghcr.io/navikt/mock-oauth2-server:2.1.10
          ports:
            - containerPort: 9999
              name: http
          env:
            - name: SERVER_PORT
              value: "9999"
            - name: JSON_CONFIG_PATH
              value: /etc/mock-oauth2/config.json
          volumeMounts:
            - name: config
              mountPath: /etc/mock-oauth2
              readOnly: true
          readinessProbe:
            httpGet:
              path: /entra/.well-known/openid-configuration
              port: 9999
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: mock-oauth2-config
