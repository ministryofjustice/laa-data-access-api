apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}-allow-api-to-postgresql
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      # The postgres release is deployed as "<api-release>-postgresql" in the same namespace
      app.kubernetes.io/instance: {{ printf "%s-postgresql" .Release.Name }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              # Restrict access to only the API pods from THIS Helm release
              app.kubernetes.io/name: data-access-api
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5432

