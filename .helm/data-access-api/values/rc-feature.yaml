# Per-Feature RC Environment Values
# This is a YAML-formatted file for Helm deployment.
# Declare variables to be passed into templates.
#
# This is a shared values file used by ALL per-feature RC environments.
# Feature environments are spun up via workflow_dispatch — no tag convention required.
#
# The feature name becomes the release name suffix:
#   e.g. feature-name=schema-v2 → laa-data-access-api-rc-schema-v2
#
# Feature flags are passed dynamically at deploy time via --set featureFlags.<key>=<value>
# and are injected as FEATURE_<KEY> environment variables in the pod.
# No per-feature values file is needed.

replicaCount: 1

image:
  repository: null  # Set by GitHub Actions
  tag: null         # Set by GitHub Actions (git commit SHA)

service_account:
  name: laa-data-access-uat-service-account

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: modsec-non-prod
  annotations:
    external-dns.alpha.kubernetes.io/aws-weight: "100"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecAction "id:900200,phase:1,nolog,pass,t:none,setvar:tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE"
      SecDefaultAction "phase:2,pass,log,tag:github_team=laa-data-stewardship-access-team,tag:namespace=laa-data-access-api-uat"
  hosts: []  # Set by deployment action to: laa-data-access-api-rc-<feature>-uat.cloud-platform.service.justice.gov.uk

ingressInternal:
  enabled: true
  className: internal-non-prod
  annotations:
    external-dns.alpha.kubernetes.io/aws-weight: "100"
  hosts: []  # Set by deployment action

resources:
  limits:
    cpu: 1000m
    memory: 1G
  requests:
    cpu: 25m
    memory: 1G

autoscaling:
  enabled: false  # Feature environments use a single replica — no autoscaling needed

sentry:
  enabled: true
  environment: rc-feature
  tracesSampleRate: 1

grafana:
  enabled: true

slowQueryThresholdSeconds: 1

portForward:
  enabled: false

# Mock OAuth2 Server - Use shared instance
# All PR/feature environments share ONE mock-oauth2 instance
mockOAuth2:
  enabled: false  # Don't deploy per-PR instance
  sharedInstance:
    enabled: true  # Use the shared instance
    serviceName: laa-data-access-mock-oauth2-shared
    namespace: laa-data-access-api-uat

featureFlags:
  # Enable dev token for easy testing in PR environments
  enable_dev_token: "true"

extraEnv: {}
