apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.serviceName }}
  labels:
    {{- include "shared-mock-oauth2.labels" . | nindent 4 }}
    app.kubernetes.io/component: mock-oauth2
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "shared-mock-oauth2.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shared-mock-oauth2.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mock-oauth2
    spec:
      containers:
        - name: mock-oauth2-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 9999
              protocol: TCP
          env:
            - name: SERVER_PORT
              value: "9999"
            - name: JSON_CONFIG_PATH
              value: /etc/mock-oauth2/config.json
          volumeMounts:
            - name: config
              mountPath: /etc/mock-oauth2
              readOnly: true
          readinessProbe:
            httpGet:
              path: /entra/.well-known/openid-configuration
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /entra/.well-known/openid-configuration
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: [ "ALL" ]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ .Values.serviceName }}-config
