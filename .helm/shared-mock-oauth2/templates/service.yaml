apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.serviceName }}
  labels:
    {{- include "shared-mock-oauth2.labels" . | nindent 4 }}
    app.kubernetes.io/component: mock-oauth2
spec:
  type: ClusterIP
  ports:
    - port: 9999
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "shared-mock-oauth2.selectorLabels" . | nindent 4 }}
