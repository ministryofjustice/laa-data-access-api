name: "Get release name"
description: 'Get a release name'

inputs:
  pr-number:
    description: "Pull request number. When provided, release name will be pr-{number}."
    required: false

outputs:
  branch-name:
    description: "Extracted branch name"
    value: ${{ steps.extract_branch.outputs.branch_name }}
  release-name:
    description: "Extracted release name"
    value: ${{ steps.extract_release.outputs.release_name }}

runs:
  using: "composite"
  steps:

    - name: Extract branch name
      id: extract_branch
      shell: bash
      run: |
        if [ $GITHUB_EVENT_NAME == "pull_request" ]
        then
          branch=$GITHUB_HEAD_REF
        else
          branch=${GITHUB_REF#refs/heads/}
        fi
        echo "branch_name=$branch" >> $GITHUB_OUTPUT
        echo "branch_name being exported: $branch"

    - name: Extract release name from branch name
      id: extract_release
      shell: bash
      env:
        PR_NUMBER: ${{ inputs.pr-number }}
        BRANCH_NAME: ${{ steps.extract_branch.outputs.branch_name }}
      run: |
        if [[ -n "$PR_NUMBER" ]]; then
          release_name="pr-${PR_NUMBER}"
        else
          release_name=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | tr -s ' _/[]().' '-' | cut -c1-15 | sed 's/-$//')
        fi
        echo "release_name=${release_name}" >> $GITHUB_OUTPUT
        echo "release_name being exported: ${release_name}"
