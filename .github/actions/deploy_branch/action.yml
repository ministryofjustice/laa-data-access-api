name: "Deploy branch"
description: 'Deploy docker image of branch to namespace with an ingress based on branch name'
inputs:
  ecr-repository:
    description: "ECR repository"
    required: true
  ecr-region:
    description: "ECR region"
    required: true
  ecr-role-to-assume:
    description: "ECR role to assume"
    required: true
  kube-cert:
    description: "Kubernetes cluster authentication certificate"
    required: true
  kube-token:
    description: "Kubernetes cluster authentication token"
    required: true
  kube-cluster:
    description: "Kubernetes cluster name"
    required: true
  kube-namespace:
    description: "Kubernetes cluster namespace"
    required: true
  app-environment:
    description: "environment to which the app is being deployed [staging, production, etc]"
    required: true
  release-name-override:
    description: "Optional fixed Helm release name. If omitted, the name is derived from the branch name."
    required: false
    default: ''
  deploy-mass-generator:
    description: "Whether to deploy the mass-generator alongside the app. Defaults to false."
    required: false
    default: 'false'
  feature-flags:
    description: "Optional comma-separated key=value feature flags (e.g. schemaV2=true,newEndpoint=false). Each pair becomes --set featureFlags.<key>=<value> in the helm upgrade call."
    required: false
    default: ''

outputs:
  branch-name:
    description: "Extracted branch name"
    value: ${{ steps.extract_release_name.outputs.branch-name }}
  release-name:
    description: "Effective Helm release name (override takes precedence over derived name)"
    value: ${{ steps.resolve_release_name.outputs.release_name }}

runs:
  using: "composite"
  steps:

    - name: Extract release name
      id: extract_release_name
      uses: ./.github/actions/get_release_name

    - name: Resolve effective release name
      id: resolve_release_name
      shell: bash
      run: |
        if [ -n "${{ inputs.release-name-override }}" ]; then
          echo "release_name=${{ inputs.release-name-override }}" >> $GITHUB_OUTPUT
        else
          echo "release_name=${{ steps.extract_release_name.outputs.release-name }}" >> $GITHUB_OUTPUT
        fi

    - name: Authenticate to the cluster
      uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@2aa2676c3cd9876ec7037ee8b3d729d0306cb7c6
      with:
        kube-cert: ${{ inputs.kube-cert }}
        kube-token: ${{ inputs.kube-token }}
        kube-cluster: ${{ inputs.kube-cluster }}
        kube-namespace: ${{ inputs.kube-namespace }}

    - name: Setup ECR
      id: setup-ecr
      uses: ./.github/actions/setup-ecr
      with:
        ecr-role-to-assume: ${{ inputs.ecr-role-to-assume }}
        ecr-region: ${{ inputs.ecr-region }}

    - name: Fetch LAA IP allowlist
      id: laa-ips
      uses: ./.github/actions/fetch-laa-ips

    - name: Provision ephemeral database and resolve Spring profile
      id: db
      uses: ./.github/actions/provision-ephemeral-db
      with:
        app-environment: ${{ inputs.app-environment }}
        branch-name: ${{ steps.extract_release_name.outputs.branch-name }}
        release-name: ${{ steps.resolve_release_name.outputs.release_name }}
        kube-namespace: ${{ inputs.kube-namespace }}

    - name: Build feature flag Helm args
      id: feature-flags
      shell: bash
      run: |
        FEATURE_FLAG_ARGS=""
        if [ -n "${{ inputs.feature-flags }}" ]; then
          # Parse comma-separated key=value pairs into individual --set featureFlags.<key>=<value> args
          # e.g. "schemaV2=true,newEndpoint=false" →
          #      "--set featureFlags.schemaV2=true --set featureFlags.newEndpoint=false"
          IFS=',' read -ra FLAGS <<< "${{ inputs.feature-flags }}"
          for flag in "${FLAGS[@]}"; do
            KEY=$(echo "$flag" | cut -d= -f1)
            VAL=$(echo "$flag" | cut -d= -f2-)
            FEATURE_FLAG_ARGS="$FEATURE_FLAG_ARGS --set featureFlags.${KEY}=${VAL}"
          done
        fi
        echo "args=$FEATURE_FLAG_ARGS" >> $GITHUB_OUTPUT

    - name: Helm deployment of branch
      shell: bash
      env:
        ECR_REPOSITORY: ${{ inputs.ecr-repository }}
        ECR_REGION: ${{ inputs.ecr-region }}
        ECR_REGISTRY: ${{ steps.setup-ecr.outputs.registry }}
        GIT_SHA: ${{ github.sha }}
        KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
        RELEASE_NAME: ${{ steps.resolve_release_name.outputs.release_name }}
        SPRING_PROFILE: ${{ steps.db.outputs.spring-profile }}
        LAA_IPS: ${{ steps.laa-ips.outputs.ips }}
        FEATURE_FLAG_ARGS: ${{ steps.feature-flags.outputs.args }}
        VALUES_FILE: .helm/data-access-api/values/${{ inputs.app-environment }}.yaml
      run: |
        set -euo pipefail

        branch_name="${{ steps.extract_release_name.outputs.branch-name }}"

        # Mirror Helm's fullname helper: if the release name already contains the chart name
        # ("data-access-api"), the ingress resource is named after the release name alone;
        # otherwise the chart name is appended. This must match or the gatekeeper will reject
        # the external-dns set-identifier annotation.
        if echo "$RELEASE_NAME" | grep -q "data-access-api"; then
          ingress_name="$RELEASE_NAME"
        else
          ingress_name="$RELEASE_NAME-data-access-api"
        fi

        # Extract environment suffix from namespace to create shorter, more readable URLs
        # e.g., "laa-data-access-api-uat" -> "uat", "laa-data-access-api-staging" -> "staging"
        ENV_SUFFIX=$(echo "$KUBE_NAMESPACE" | sed 's/^laa-data-access-api-//')
        external_host="$RELEASE_NAME-$ENV_SUFFIX.cloud-platform.service.justice.gov.uk"
        internal_host="$RELEASE_NAME-internal-$ENV_SUFFIX.internal-non-prod.cloud-platform.service.justice.gov.uk"
        external_identifier="$ingress_name-$KUBE_NAMESPACE-green"
        internal_identifier="$ingress_name-internal-$KUBE_NAMESPACE-green"

        echo "Deploying commit: $GIT_SHA under release name: $RELEASE_NAME"
        echo "Hosts: $external_host | $internal_host"
        echo "Spring profile: $SPRING_PROFILE | Branch: $branch_name"

        helm upgrade "$RELEASE_NAME" .helm/data-access-api \
          --namespace "${KUBE_NAMESPACE}" \
          --set image.repository="${ECR_REGISTRY}/${ECR_REPOSITORY}" \
          --set image.tag="${GIT_SHA}" \
          --set ingress.annotations."external-dns\.alpha\.kubernetes\.io/set-identifier"="$external_identifier" \
          --set ingress.annotations."nginx\.ingress\.kubernetes\.io/whitelist-source-range"="$LAA_IPS" \
          --set ingress.hosts="{$external_host}" \
          --set ingressInternal.annotations."external-dns\.alpha\.kubernetes\.io/set-identifier"="$internal_identifier" \
          --set ingressInternal.hosts="{$internal_host}" \
          --set spring.profile="${SPRING_PROFILE}" \
          --set aws.region="${ECR_REGION}" \
          --set autoscaling.enabled="$([ "$branch_name" = "main" ] && echo true || echo false)" \
          ${FEATURE_FLAG_ARGS} \
          --values "${VALUES_FILE}" \
          --install \
          --wait

    - name: Helm deployment of mass-generator
      if: inputs.deploy-mass-generator == 'true'
      shell: bash
      env:
        ECR_REPOSITORY: ${{ inputs.ecr-repository }}
        ECR_REGISTRY: ${{ steps.setup-ecr.outputs.registry }}
        GIT_SHA: ${{ github.sha }}
        KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
        RELEASE_NAME: ${{ steps.resolve_release_name.outputs.release_name }}
        SPRING_PROFILE: ${{ steps.db.outputs.spring-profile }}
      run: |
        helm upgrade "${RELEASE_NAME}-mass-generator" .helm/mass-generator \
          --namespace "${KUBE_NAMESPACE}" \
          --set image.repository="${ECR_REGISTRY}/${ECR_REPOSITORY}" \
          --set image.tag="${GIT_SHA}-mass-generator" \
          --set spring.profile="${SPRING_PROFILE}" \
          --set db.postgresqlReleaseName="${RELEASE_NAME}-postgresql" \
          --install \
          --wait
