name: "Deploy branch"
description: 'Deploy docker image of branch to namespace with an ingress based on branch name'
inputs:
  ecr-repository:
    description: "ECR repository"
    required: true
  ecr-region:
    description: "ECR region"
    required: true
  ecr-role-to-assume:
    description: "ECR role to assume"
    required: true
  kube-cert:
    description: "Kubernetes cluster authentication certificate"
    required: true
  kube-token:
    description: "Kubernetes cluster authentication token"
    required: true
  kube-cluster:
    description: "Kubernetes cluster name"
    required: true
  kube-namespace:
    description: "Kubernetes cluster namespace"
    required: true
  app-environment:
    description: "environment to which the app is being deployed [staging, production, etc]"
    required: true

outputs:
  branch-name:
    description: "Extracted branch name"
    value: ${{ steps.extract_release_name.outputs.branch-name }}
  release-name:
    description: "Extracted release name"
    value: ${{ steps.extract_release_name.outputs.release-name }}

runs:
  using: "composite"
  steps:

    - name: Extract release name
      id: extract_release_name
      uses: ./.github/actions/get_release_name

    - name: Authenticate to the cluster
      uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@2aa2676c3cd9876ec7037ee8b3d729d0306cb7c6
      with:
        kube-cert: ${{ inputs.kube-cert }}
        kube-token: ${{ inputs.kube-token }}
        kube-cluster: ${{ inputs.kube-cluster }}
        kube-namespace: ${{ inputs.kube-namespace }}

    - name: Assume role in Cloud Platform
      uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
      with:
        role-to-assume: ${{ inputs.ecr-role-to-assume }}
        aws-region: ${{ inputs.ecr-region }}

    - name: Docker login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2
      with:
        mask-password: 'true'

    - name: Helm deployment of branch
      shell: bash
      env:
        ECR_REPOSITORY: ${{ inputs.ecr-repository }}
        ECR_REGION: ${{ inputs.ecr-region }}
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        GIT_SHA: ${{ github.sha }}
        KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
        VALUES_FILE: .helm/data-access-api/values/${{ inputs.app-environment }}.yaml
        RELEASE_NAME: ${{ steps.extract_release_name.outputs.release-name }}
      run: |
        ingress_name="$RELEASE_NAME-data-access-api"
        external_host="$RELEASE_NAME-$KUBE_NAMESPACE.cloud-platform.service.justice.gov.uk"
        internal_host="$RELEASE_NAME-internal-$KUBE_NAMESPACE.internal-non-prod.cloud-platform.service.justice.gov.uk"
        external_identifier="$ingress_name-$KUBE_NAMESPACE-green"
        internal_identifier="$RELEASE_NAME-data-access-api-internal-$KUBE_NAMESPACE-green"
        branch_name=${{ steps.extract_release_name.outputs.branch-name }}
        LAA_IPS=$(curl -s https://raw.githubusercontent.com/ministryofjustice/laa-ip-allowlist/main/cidrs.txt | tr -d ' ' | tr '\n' ',' | sed 's/,/\\,/g' | sed 's/\\,$//')

        echo "Deploying commit: $GIT_SHA under release name: $RELEASE_NAME to $external_host and $internal_host..."

        echo "branch name: $branch_name"

        if [ "$branch_name" == "main" ]; then
          case "${{ inputs.app-environment }}" in
            production)
              export SPRING_PROFILE="main"
              ;;
            *)
              export SPRING_PROFILE="unsecured"
              ;;
          esac
        else
          export SPRING_PROFILE="preview"
          # Using Bitnami legacy with PostgreSQL 17.2 (specified in values.yaml)
          helm upgrade ${RELEASE_NAME}-postgresql oci://registry-1.docker.io/bitnamicharts/postgresql \
            -f .helm/bitnami_postgres/values.yaml \
            --namespace ${KUBE_NAMESPACE} \
            --install --wait
        fi

        helm upgrade $RELEASE_NAME .helm/data-access-api \
          --namespace ${KUBE_NAMESPACE} \
          --set image.repository="${ECR_REGISTRY}/${ECR_REPOSITORY}" \
          --set image.tag="${GIT_SHA}" \
          --set ingress.annotations."external-dns\.alpha\.kubernetes\.io/set-identifier"="$external_identifier" \
          --set ingress.annotations."nginx\.ingress\.kubernetes\.io/whitelist-source-range"="$LAA_IPS" \
          --set ingress.hosts="{$external_host}" \
          --set ingressInternal.annotations."external-dns\.alpha\.kubernetes\.io/set-identifier"="$internal_identifier" \
          --set ingressInternal.hosts="{$internal_host}" \
          --set spring.profile="${SPRING_PROFILE}" \
          --set aws.region="${ECR_REGION}" \
          --values ${VALUES_FILE} \
          --install \
          --wait

    - name: Helm deployment of mass generator
      shell: bash
      continue-on-error: true
      env:
        ECR_REPOSITORY: ${{ inputs.ecr-repository }}
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        GIT_SHA: ${{ github.sha }}
        KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
        APP_ENVIRONMENT: ${{ inputs.app-environment }}
      run: |
        MASS_GEN_VALUES=".helm/mass-generator/values/${APP_ENVIRONMENT}.yaml"
        if [ -f "${MASS_GEN_VALUES}" ]; then
          # Fix stuck helm release if previous operation failed
          RELEASE_STATUS=$(helm status laa-mass-generator --namespace ${KUBE_NAMESPACE} -o json 2>/dev/null | jq -r '.info.status' 2>/dev/null || echo "not-found")
          if [ "$RELEASE_STATUS" = "pending-install" ] || [ "$RELEASE_STATUS" = "pending-upgrade" ] || [ "$RELEASE_STATUS" = "pending-rollback" ]; then
            echo "Release is stuck in ${RELEASE_STATUS}, rolling back..."
            helm rollback laa-mass-generator 0 --namespace ${KUBE_NAMESPACE} || helm uninstall laa-mass-generator --namespace ${KUBE_NAMESPACE} || true
          fi

          helm upgrade laa-mass-generator .helm/mass-generator \
            --namespace ${KUBE_NAMESPACE} \
            --set image.repository="${ECR_REGISTRY}/${ECR_REPOSITORY}" \
            --set image.tag="mass-gen-${GIT_SHA}" \
            --values ${MASS_GEN_VALUES} \
            --install \
            --wait
        else
          echo "No mass generator values file for ${APP_ENVIRONMENT}, skipping"
        fi

