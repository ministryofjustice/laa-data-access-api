name: "Build and push"
description: 'builds docker image and pushes it to the specified ECR'
inputs:
  ecr-region:
    description: "ECR region"
    required: true
  ecr-role-to-assume:
    description: "ECR role to assume"
    required: true
  ecr-repository:
    description: "ECR repository"
    required: true

runs:
  using: "composite"
  steps:
    - name: Store current date
      shell: bash
      run: echo "BUILD_DATE=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV

    - name: Assume role in Cloud Platform
      uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
      with:
        role-to-assume: ${{ inputs.ecr-role-to-assume }}
        aws-region: ${{ inputs.ecr-region }}

    - name: Docker login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6
      with:
        mask-password: 'true'

    - name: Extract release name
      id: extract_release_name
      uses: ./.github/actions/get_release_name

    - name: Build
      shell: bash
      env:
        GIT_SHA: ${{ github.sha }}
        GIT_REF: ${{ github.ref }}
        RELEASE_NAME: ${{ steps.extract_release_name.outputs.release-name }}
      run: |
        docker build \
          --label build.git.sha="$GIT_SHA" \
          --label build.git.branch="$GIT_REF" \
          --label build.date="$BUILD_DATE" \
          --build-arg APP_BUILD_DATE="$BUILD_DATE" \
          --build-arg APP_BUILD_TAG="$GIT_REF" \
          --build-arg APP_GIT_COMMIT="$GIT_SHA" \
          --build-arg APP_BRANCH="$RELEASE_NAME" \
          --pull \
          --tag app .

    - name: Push to ECR
      shell: bash
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ inputs.ecr-repository }}
        GIT_SHA: ${{ github.sha }}
        GIT_REF: ${{ github.ref }}
      run: |
        docker tag app "${ECR_REGISTRY}/${ECR_REPOSITORY}:${GIT_SHA}"
        docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:${GIT_SHA}"

        if [ "$GIT_REF" == 'refs/heads/main' ]; then
          docker tag app "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
        fi
