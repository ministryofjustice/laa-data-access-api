name: "Setup ECR"
description: "Assumes an IAM role via OIDC and logs Docker into ECR. Exposes the registry URL as an output."

inputs:
  ecr-role-to-assume:
    description: "IAM role ARN to assume via OIDC"
    required: true
  ecr-region:
    description: "AWS region where ECR is hosted"
    required: true

outputs:
  registry:
    description: "ECR registry URL (e.g. 123456789.dkr.ecr.eu-west-2.amazonaws.com)"
    value: ${{ steps.login-ecr.outputs.registry }}

runs:
  using: "composite"
  steps:

    - name: Assume role in Cloud Platform
      uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
      with:
        role-to-assume: ${{ inputs.ecr-role-to-assume }}
        aws-region: ${{ inputs.ecr-region }}

    - name: Docker login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2
      with:
        mask-password: 'true'

