name: "Smoke test"
description: "Run smoke tests against a deployed release via in-cluster port-forwards"

inputs:
  release-name:
    description: "Helm release name to target"
    required: true
  branch-name:
    description: "Git branch name used to determine DB target"
    required: true
  kube-cert:
    description: "Kubernetes cluster authentication certificate"
    required: true
  kube-token:
    description: "Kubernetes cluster authentication token"
    required: true
  kube-cluster:
    description: "Kubernetes cluster name"
    required: true
  kube-namespace:
    description: "Kubernetes namespace"
    required: true
  github-token:
    description: "GitHub token used by Gradle"
    required: true
  report-name:
    description: "Artifact name for smoke-test reports"
    required: false
    default: "uat-smoke-test-report"

runs:
  using: "composite"
  steps:
    - name: Set up JDK 25
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: 25
        distribution: "corretto"

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

    - name: Authenticate to the cluster
      uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@2aa2676c3cd9876ec7037ee8b3d729d0306cb7c6
      with:
        kube-cert: ${{ inputs.kube-cert }}
        kube-token: ${{ inputs.kube-token }}
        kube-cluster: ${{ inputs.kube-cluster }}
        kube-namespace: ${{ inputs.kube-namespace }}

    - name: Resolve smoke-test target
      id: target
      shell: bash
      env:
        BRANCH_NAME: ${{ inputs.branch-name }}
        RELEASE_NAME: ${{ inputs.release-name }}
      run: |
        set -euo pipefail
        if [ "$BRANCH_NAME" = "main" ]; then
          echo "db_pod_selector=run=port-forward-pod" >> "$GITHUB_OUTPUT"
          echo "db_secret=rds-postgresql-instance-output" >> "$GITHUB_OUTPUT"
          echo "db_flavour=rds" >> "$GITHUB_OUTPUT"
        else
          echo "db_pod_selector=app.kubernetes.io/instance=${RELEASE_NAME}-postgresql,app.kubernetes.io/name=postgresql" >> "$GITHUB_OUTPUT"
          echo "db_secret=${RELEASE_NAME}-postgresql" >> "$GITHUB_OUTPUT"
          echo "db_flavour=bitnami" >> "$GITHUB_OUTPUT"
        fi
        echo "app_pod_selector=app.kubernetes.io/instance=${RELEASE_NAME},app.kubernetes.io/name=data-access-api" >> "$GITHUB_OUTPUT"

    - name: Port forward to Postgres
      uses: ./.github/actions/port-forward
      with:
        kube_namespace: ${{ inputs.kube-namespace }}
        pod_selector: ${{ steps.target.outputs.db_pod_selector }}
        local_port: "5432"
        remote_port: "5432"
        pid_env_var: DB_PORT_FORWARD_PID

    - name: Port forward to app
      uses: ./.github/actions/port-forward
      with:
        kube_namespace: ${{ inputs.kube-namespace }}
        pod_selector: ${{ steps.target.outputs.app_pod_selector }}
        local_port: "8080"
        remote_port: "8080"
        pid_env_var: APP_PORT_FORWARD_PID

    - name: Configure smoke-test environment
      shell: bash
      env:
        KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
        DB_SECRET: ${{ steps.target.outputs.db_secret }}
        DB_FLAVOUR: ${{ steps.target.outputs.db_flavour }}
      run: |
        set -euo pipefail
        decode() {
          kubectl -n "$KUBE_NAMESPACE" get secret "$DB_SECRET" -o jsonpath="{.data.$1}" | base64 -d
        }
        if [ "$DB_FLAVOUR" = "rds" ]; then
          DB_NAME=$(decode database_name)
          DB_USER=$(decode database_username)
          DB_PASS=$(decode database_password)
        else
          DB_NAME="postgres"
          DB_USER="postgres"
          DB_PASS=$(decode postgres-password)
        fi
        echo "::add-mask::$DB_PASS"
        {
          echo "LAA_SMOKE_ACCESS_API_URL=http://localhost:8080"
          echo "LAA_SMOKE_ACCESS_DB_URL=jdbc:postgresql://localhost:5432/$DB_NAME"
          echo "LAA_SMOKE_ACCESS_DB_USERNAME=$DB_USER"
          echo "LAA_SMOKE_ACCESS_DB_PASSWORD=$DB_PASS"
        } >> "$GITHUB_ENV"

    - name: Run smoke tests
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: ./gradlew :data-access-service:infrastructureTest --continue --console=plain

    - name: Upload smoke test report
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: ${{ inputs.report-name }}
        path: data-access-service/build/reports/tests/infrastructureTest
        retention-days: 14

    - name: Stop port-forwards
      if: always()
      shell: bash
      run: |
        for pid in "${DB_PORT_FORWARD_PID:-}" "${APP_PORT_FORWARD_PID:-}"; do
          [ -n "$pid" ] && kill "$pid" 2>/dev/null || true
        done

    - name: Delete in-cluster port-forward resources
      if: always()
      shell: bash
      env:
        KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
      run: |
        kubectl -n "$KUBE_NAMESPACE" delete deployment port-forward-pod --ignore-not-found
        kubectl -n "$KUBE_NAMESPACE" delete service laa-data-access-api-uat-postgresql-portforward --ignore-not-found

