name: Deploy Release

# Triggered by pushing a release tag from main (e.g. v1.2.3 — no -rc. suffix).
# Builds, scans, pushes the Docker image, then deploys to staging and production
# with manual approval gates on each environment.
#
# Prerequisites: the tagged commit must already be on main and have passed CI.
# The validate-release-on-main job enforces this and will fail the workflow if not.
#
# For release candidate deployment see deploy-rc.yml.
# For PR and main branch CI see ci.yml.

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Never cancel a release in progress

permissions:
  contents: read

jobs:
  build-test:
    # Guard against RC tags (v*-rc.*) — this workflow only handles final releases.
    # RC tags also match 'v*' so we must skip explicitly.
    if: "!contains(github.ref, '-rc.')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Build and test
        run: ./gradlew build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Integration test
        run: ./gradlew integrationTest

      - name: Upload service JAR artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: service-jar
          path: data-access-service/build/libs/*.jar
          retention-days: 1

  vulnerability-scan-app:
    if: "!contains(github.ref, '-rc.')"
    runs-on: ubuntu-latest
    needs:
      - build-test
    permissions:
      contents: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SNYK_TEST_EXCLUDE: build,generated
      SNYK_TARGET_REFERENCE: main
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run Snyk to check app for vulnerabilities
        uses: snyk/actions/gradle@9adf32b1121593767fc3c057af55b55db032dc04 #master
        with:
          command: code test
          args: --severity-threshold=high

  vulnerability-scan-docker:
    if: "!contains(github.ref, '-rc.')"
    runs-on: ubuntu-latest
    needs:
      - build-test
    permissions:
      contents: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Build app jar with gradle
        run: ./gradlew build

      - name: Build local Docker image
        run: |
          docker build -t data-access-service-scan .
          docker save data-access-service-scan -o image.tar

      - name: Run Snyk to scan Docker image from tarball
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 #master
        with:
          image: image.tar
          args: --docker --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  build-push-docker:
    name: Build and push Docker image
    if: "!contains(github.ref, '-rc.')"
    runs-on: ubuntu-latest
    needs:
      - build-test
    permissions:
      id-token: write
      contents: read
    steps:

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download JAR artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: service-jar
          path: data-access-service/build/libs/

      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@00943011d9042930efac3dcd3a170e4273319bc8 # v5.1.0
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2

      - name: Build and push Docker image
        run: |
          docker build --no-cache -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}

  validate-release-on-main:
    if: "!contains(github.ref, '-rc.')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        run: |
          set -euo pipefail

          TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref }})
          echo "Tag commit: $TAG_COMMIT"

          if git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "✓ Tag is on main branch - safe to deploy to staging"
            exit 0
          else
            echo "✗ ERROR: Tag commit is NOT on main branch!"
            echo "Tag: ${{ github.ref }}"
            echo "Commit: $TAG_COMMIT"
            echo ""
            echo "Release tags must be created on commits that are already merged to main."
            echo ""
            echo "To fix:"
            echo "  1. Delete the tag: git tag -d ${{ github.ref_name }}"
            echo "  2. Push deletion: git push origin :${{ github.ref_name }}"
            echo "  3. Merge your commit to main and run smoke tests"
            echo "  4. Then re-tag from the commit on main"
            exit 1
          fi

  deploy-staging:
    runs-on: ubuntu-latest
    needs:
      - build-push-docker
      - vulnerability-scan-app
      - vulnerability-scan-docker
      - validate-release-on-main
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Deploy staging
        uses: ./.github/actions/deploy
        with:
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: staging

  deploy-production:
    runs-on: ubuntu-latest
    needs:
      - deploy-staging
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Deploy production
        uses: ./.github/actions/deploy
        with:
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: production

