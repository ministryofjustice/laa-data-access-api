name: Delete preview deployment for a branch after its PR is merged or closed

on:
  workflow_dispatch:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:

  cleanup-preview:
    runs-on: ubuntu-latest
    environment: uat
    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Cleanup preview environment
        id: cleanup_preview
        uses: ./.github/actions/cleanup_branch
        with:
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: preview
