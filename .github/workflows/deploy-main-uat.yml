name: Deploy to UAT on Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test-docker:
    uses: ./.github/workflows/build-test-docker.yml
    secrets: inherit

  resolve-image-metadata:
    runs-on: ubuntu-latest
    needs:
      - build-test-docker
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      image_digest: ${{ steps.resolve.outputs.image_digest }}
    steps:
      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@00943011d9042930efac3dcd3a170e4273319bc8 # v5.1.0
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - name: Resolve pushed image metadata
        id: resolve
        shell: bash
        env:
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          DIGEST=$(aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY" \
            --image-ids imageTag="$IMAGE_TAG" \
            --query 'imageDetails[0].imageDigest' \
            --output text)

          if [ -z "$DIGEST" ] || [ "$DIGEST" = "None" ]; then
            echo "Failed to resolve ECR digest for tag: $IMAGE_TAG"
            exit 1
          fi

          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image_digest=$DIGEST" >> "$GITHUB_OUTPUT"

  deploy-uat:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - build-test-docker
      - resolve-image-metadata
    environment: uat
    permissions:
      id-token: write
      contents: read
    outputs:
      release-name: ${{ steps.deploy_uat_branch.outputs.release-name }}
      branch-name: ${{ steps.deploy_uat_branch.outputs.branch-name }}

    steps:

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Deploy UAT
        id: deploy_uat_branch
        uses: ./.github/actions/deploy_branch
        with:
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: uat
          image-tag: ${{ needs.resolve-image-metadata.outputs.image_tag }}
          image-digest: ${{ needs.resolve-image-metadata.outputs.image_digest }}

  uat-smoke-test:
    if: startsWith(github.head_ref || github.ref_name, 'openapi/') == false
    runs-on: ubuntu-latest
    needs:
      - deploy-uat
    environment: uat
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run smoke tests
        uses: ./.github/actions/smoke-test
        with:
          release-name: ${{ needs.deploy-uat.outputs.release-name }}
          branch-name: ${{ needs.deploy-uat.outputs.branch-name }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          report-name: uat-smoke-test-report

