name: Deploy with Helm

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    if: startsWith(github.head_ref || github.ref_name, 'openapi/') == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Build and test
        run: ./gradlew build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # TODO: Re-enable - temporarily disabled to unblock testing seeding job
      # - name: Test coverage verification
      #   run: ./gradlew jacocoTestCoverageVerification

      - name: Integration test
        run: ./gradlew integrationTest

      - name: Publish api models package
        run: |
          version=$(git rev-parse --short HEAD)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            version=${version}-SNAPSHOT
          fi
          ./gradlew :data-access-api:publish -Pversion=$version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload service JAR artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: service-jar
          path: data-access-service/build/libs/*.jar
          retention-days: 1

      - name: Upload mass generator JAR artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mass-generator-jar
          path: |
            data-access-mass-generator/build/libs/data-access-mass-generator-*-SNAPSHOT.jar
            !data-access-mass-generator/build/libs/*-perf.jar
          retention-days: 1

      - name: Upload checkstyle report for data-access-service
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: checkstyle-report
          path: data-access-service/build/reports/checkstyle
          retention-days: 14

      - name: Upload test report for data-access-service
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-report
          path: data-access-service/build/reports/tests
          retention-days: 14

      - name: Upload jacoco coverage report for data-access-service
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jacoco-coverage-report
          path: data-access-service/build/reports/jacoco
          retention-days: 14

  sca:
    name: Software Composition Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      pull-requests: write
      issues: write
      security-events: write
      actions: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run SCA
        uses: ./.github/actions/sca
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Only open Renovate PRs/updates on main. Never from PR context.
          renovate: ${{ github.ref == 'refs/heads/main' && 'true' || 'false' }}
          codeql-upload-findings: "always"

  infrastructure-smoke-test:
    if: startsWith(github.head_ref || github.ref_name, 'openapi/') == false
    runs-on: ubuntu-latest
    needs:
      - build-test
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run infrastructure smoke tests
        run: ./scripts/run-infrastructure-smoke-tests.sh
        env:
          FEATURE_ENABLE_DEV_TOKEN: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: data-access-service/build/reports/tests/integrationTest
          retention-days: 14

  vulnerability-scan-app:
    runs-on: ubuntu-latest
    needs:
      - build-test
    permissions:
      contents: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SNYK_TEST_EXCLUDE: build,generated
      SNYK_TARGET_REFERENCE: main
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run Snyk to check app for vulnerabilities
        uses: snyk/actions/gradle@9adf32b1121593767fc3c057af55b55db032dc04 #master
        with:
          command: code test
          args: --severity-threshold=high

  vulnerability-scan-docker:
    runs-on: ubuntu-latest
    needs:
      - build-test
    permissions:
      contents: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Build app jar with gradle
        run: ./gradlew build

      - name: Build local Docker image
        run: |
          docker build -t data-access-service-scan .
          docker save data-access-service-scan -o image.tar

      - name: Run Snyk to scan Docker image from tarball
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 #master
        with:
          image: image.tar
          args: --docker --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  build-push-docker:
    name: build and push docker image
    runs-on: ubuntu-latest
    needs:
      - build-test
    permissions:
      id-token: write
      contents: read
    steps:

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download JAR artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: service-jar
          path: data-access-service/build/libs/

      - name: Download mass generator JAR artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: mass-generator-jar
          path: data-access-mass-generator/build/libs/

        # ---------- AWS auth (OIDC) ----------
      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@00943011d9042930efac3dcd3a170e4273319bc8 # v5.1.0
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{  vars.ECR_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2
        id: login-ecr
      - name: Build and push a Docker image for data-access-service
        run: |
          docker build --no-cache -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}

      - name: Build and push a Docker image for mass-generator
        run: |
          docker build --no-cache -f Dockerfile.mass-generator -t $REGISTRY/$REPOSITORY:mass-gen-$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:mass-gen-$IMAGE_TAG
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}

  deploy-uat:
    runs-on: ubuntu-latest
    needs:
      - build-push-docker
      - infrastructure-smoke-test
      - vulnerability-scan-app
      - vulnerability-scan-docker
      - sca
    environment: uat
    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Deploy UAT branch
        id: deploy_uat_branch
        uses: ./.github/actions/deploy_branch
        with:
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: uat

  # TEMPORARY: Remove this job before merging to main.
  test-mass-generator:
    if: startsWith(github.head_ref || github.ref_name, 'openapi/') == false
    runs-on: ubuntu-latest
    needs:
      - deploy-uat
    environment: uat
    permissions:
      id-token: write
      contents: read

    env:
      COUNT: '100000'
      CLEANUP: 'false'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to the cluster
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@2aa2676c3cd9876ec7037ee8b3d729d0306cb7c6
        with:
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}

      - name: Find pod
        id: find-pod
        run: |
          NAMESPACE="${{ secrets.KUBE_NAMESPACE }}"
          POD_NAME=$(kubectl get pods -n "${NAMESPACE}" -l app=mass-generator -o jsonpath='{.items[0].metadata.name}')
          if [ -z "${POD_NAME}" ]; then
            echo "ERROR: No mass-generator pod found in namespace ${NAMESPACE}"
            exit 1
          fi
          echo "pod_name=${POD_NAME}" >> $GITHUB_OUTPUT
          echo "namespace=${NAMESPACE}" >> $GITHUB_OUTPUT
          echo "Found pod: ${POD_NAME}"

      - name: Port forward
        run: |
          POD_NAME="${{ steps.find-pod.outputs.pod_name }}"
          NAMESPACE="${{ steps.find-pod.outputs.namespace }}"
          kubectl port-forward -n "${NAMESPACE}" "${POD_NAME}" 8080:8080 &
          sleep 5

      - name: Start generation job
        id: start-job
        run: |
          echo "Starting mass generation..."
          echo "  Environment: uat"
          echo "  Count: ${{ env.COUNT }}"
          echo "  Cleanup: ${{ env.CLEANUP }}"

          echo "Checking app health..."
          curl -s "http://localhost:8080/actuator/health" | jq . || true
          echo ""

          JOB_RESPONSE=$(curl -s -X POST "http://localhost:8080/api/mass-generator/generate?count=${{ env.COUNT }}&cleanup=${{ env.CLEANUP }}")
          echo "Response: ${JOB_RESPONSE}"

          if echo "${JOB_RESPONSE}" | jq -e '.status == 500' > /dev/null 2>&1; then
            echo "ERROR: Got 500 response"
            echo "${JOB_RESPONSE}" | jq . || true
            exit 1
          fi

          JOB_ID=$(echo "${JOB_RESPONSE}" | jq -r '.jobId')
          if [ -z "${JOB_ID}" ] || [ "${JOB_ID}" = "null" ]; then
            echo "ERROR: Failed to start job. Response was: ${JOB_RESPONSE}"
            exit 1
          fi
          echo "job_id=${JOB_ID}" >> $GITHUB_OUTPUT
          echo "Job started: ${JOB_ID}"

      - name: Monitor job progress
        run: |
          JOB_ID="${{ steps.start-job.outputs.job_id }}"
          echo "Monitoring job: ${JOB_ID}"
          MAX_ITERATIONS=1440
          for i in $(seq 1 $MAX_ITERATIONS); do
            STATUS_JSON=$(curl -s "http://localhost:8080/api/mass-generator/jobs/${JOB_ID}")
            STATUS=$(echo "${STATUS_JSON}" | jq -r '.status')
            PROCESSED=$(echo "${STATUS_JSON}" | jq -r '.processedCount')
            TARGET=$(echo "${STATUS_JSON}" | jq -r '.targetCount')
            ERRORS=$(echo "${STATUS_JSON}" | jq -r '.errorCount')
            echo "[$(date +%H:%M:%S)] ${STATUS} | Progress: ${PROCESSED}/${TARGET} | Errors: ${ERRORS}"
            if [ "${STATUS}" = "COMPLETED" ]; then
              echo ""
              echo "========================================="
              echo "  Job completed successfully!"
              echo "========================================="
              echo "${STATUS_JSON}" | jq '.'
              exit 0
            elif [ "${STATUS}" = "FAILED" ] || [ "${STATUS}" = "CANCELLED" ]; then
              echo ""
              echo "  Job finished with status: ${STATUS}"
              echo "${STATUS_JSON}" | jq '.'
              exit 1
            fi
            sleep 10
          done
          echo "ERROR: Timed out after 4 hours"
          exit 1

      - name: Job summary
        if: always()
        run: |
          JOB_ID="${{ steps.start-job.outputs.job_id }}"
          if [ -n "${JOB_ID}" ]; then
            STATUS_JSON=$(curl -s "http://localhost:8080/api/mass-generator/jobs/${JOB_ID}" || echo '{}')
            echo "## Mass Data Generation Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Environment | uat |" >> $GITHUB_STEP_SUMMARY
            echo "| Requested count | ${{ env.COUNT }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Cleanup | ${{ env.CLEANUP }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Job ID | \`${JOB_ID}\` |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Result" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            echo "${STATUS_JSON}" | jq '.' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  deploy-staging:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - build-push-docker
      - vulnerability-scan-app
      - vulnerability-scan-docker
      - sca
      - deploy-uat
    environment: staging
    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Deploy staging
        id: deploy_staging
        uses: ./.github/actions/deploy
        with:
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: staging

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Deploy production
        id: deploy_production
        uses: ./.github/actions/deploy
        with:
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: production
