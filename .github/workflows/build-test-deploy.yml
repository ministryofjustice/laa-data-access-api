name: Deploy with Helm

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    if: startsWith(github.head_ref || github.ref_name, 'openapi/') == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build and test
        run: ./gradlew build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Integration test
        run: ./gradlew integrationTest

      - name: Test coverage verification
        run: ./gradlew jacocoTestCoverageVerification

      - name: Publish api models package
        run: |
          version=$(git rev-parse --short HEAD)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            version=${version}-SNAPSHOT
          fi
          ./gradlew :data-access-api:publish -Pversion=$version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload service JAR artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: service-jar
          path: data-access-service/build/libs/*.jar
          retention-days: 1

      - name: Upload mass-generator JAR artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mass-generator-jar
          path: data-access-mass-generator/build/libs/*.jar
          retention-days: 1

      - name: Upload checkstyle report for data-access-service
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: checkstyle-report
          path: data-access-service/build/reports/checkstyle
          retention-days: 14

      - name: Upload test report for data-access-service
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-report
          path: data-access-service/build/reports/tests
          retention-days: 14

      - name: Upload jacoco coverage report for data-access-service
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jacoco-coverage-report
          path: data-access-service/build/reports/jacoco
          retention-days: 14

  vulnerability-scan-app:
    runs-on: ubuntu-latest
    needs:
      - build-test
    permissions:
      contents: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SNYK_TEST_EXCLUDE: build,generated
      SNYK_TARGET_REFERENCE: main
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Snyk to check app for vulnerabilities
        uses: snyk/actions/gradle@8e119fbb6c251787721d34ba683ed48eba792766 # master
        with:
          command: code test
          args: --severity-threshold=high

  vulnerability-scan-docker:
    runs-on: ubuntu-latest
    needs:
      - build-test
    permissions:
      contents: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build app jar with gradle
        run: ./gradlew build

      - name: Build local Docker image
        run: |
          docker build -t data-access-service-scan .
          docker save data-access-service-scan -o image.tar

      - name: Run Snyk to scan Docker image from tarball
        uses: snyk/actions/docker@8e119fbb6c251787721d34ba683ed48eba792766 # master
        with:
          image: image.tar
          args: --docker --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  build-push-docker:
    name: build and push docker image
    runs-on: ubuntu-latest
    needs:
      - build-test
    permissions:
      id-token: write
      contents: read
    steps:

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download JAR artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: service-jar
          path: data-access-service/build/libs/

        # ---------- AWS auth (OIDC) ----------
      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{  vars.ECR_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6
        id: login-ecr
      - name: Build and push a Docker image for data-access-service
        run: |
          docker build --no-cache -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}

  build-push-mass-generator-docker:
    name: build and push mass-generator docker image
    runs-on: ubuntu-latest
    needs:
      - build-test
    permissions:
      id-token: write
      contents: read
    steps:

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download mass-generator JAR artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mass-generator-jar
          path: data-access-mass-generator/build/libs/

      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6
        id: login-ecr

      - name: Build and push mass-generator Docker image
        run: |
          docker build --no-cache -f Dockerfile.mass-generator \
            -t $REGISTRY/$REPOSITORY:${IMAGE_TAG}-mass-generator .
          docker push $REGISTRY/$REPOSITORY:${IMAGE_TAG}-mass-generator
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}

  deploy-ephemeral:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - build-push-docker
      - build-push-mass-generator-docker
      - vulnerability-scan-app
      - vulnerability-scan-docker
    environment: uat
    permissions:
      id-token: write
      contents: read
    outputs:
      release-name: ${{ steps.deploy_ephemeral_branch.outputs.release-name }}
      branch-name: ${{ steps.deploy_ephemeral_branch.outputs.branch-name }}

    steps:

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Deploy ephemeral branch
        id: deploy_ephemeral_branch
        uses: ./.github/actions/deploy_branch
        with:
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: uat

  ephemeral-smoke-test:
    if: github.event_name == 'pull_request' && startsWith(github.head_ref || github.ref_name, 'openapi/') == false
    runs-on: ubuntu-latest
    needs:
      - deploy-ephemeral
    environment: uat
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run smoke tests
        uses: ./.github/actions/smoke-test
        with:
          release-name: ${{ needs.deploy-ephemeral.outputs.release-name }}
          branch-name: ${{ needs.deploy-ephemeral.outputs.branch-name }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          report-name: ephemeral-smoke-test-report




  deploy-uat:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - build-push-docker
      - build-push-mass-generator-docker
      - vulnerability-scan-app
      - vulnerability-scan-docker
    environment: uat
    permissions:
      id-token: write
      contents: read
    outputs:
      release-name: ${{ steps.deploy_uat_branch.outputs.release-name }}
      branch-name: ${{ steps.deploy_uat_branch.outputs.branch-name }}

    steps:

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Deploy UAT
        id: deploy_uat_branch
        uses: ./.github/actions/deploy_branch
        with:
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: uat

  uat-smoke-test:
    if: startsWith(github.head_ref || github.ref_name, 'openapi/') == false
    runs-on: ubuntu-latest
    needs:
      - deploy-uat
    environment: uat
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run smoke tests
        uses: ./.github/actions/smoke-test
        with:
          release-name: ${{ needs.deploy-uat.outputs.release-name }}
          branch-name: ${{ needs.deploy-uat.outputs.branch-name }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          report-name: uat-smoke-test-report

  prepare-feature-environments:
    name: Approve and prepare feature environments
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: uat-preview
    needs:
      - uat-smoke-test
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve preset matrix
        id: resolve
        shell: bash
        env:
          PRESET_FILE: .github/config/ephemeral-environment-presets.json
        run: |
          set -euo pipefail

          [ -f "$PRESET_FILE" ] || { echo "Missing preset file: $PRESET_FILE"; exit 1; }

          sanitize_release_name() {
            local raw
            local cleaned
            local hash_suffix
            local prefix
            raw="$1"
            cleaned=$(echo "$raw" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9-' '-' | sed 's/^-*//; s/-*$//; s/--*/-/g')
            if [ -z "$cleaned" ]; then
              cleaned="feat-env"
            fi

            if [ ${#cleaned} -gt 53 ]; then
              hash_suffix=$(printf "%s" "$cleaned" | shasum | cut -c1-8)
              prefix=$(printf "%s" "$cleaned" | cut -c1-44 | sed 's/-*$//')
              cleaned="${prefix}-${hash_suffix}"
            fi
            echo "$cleaned"
          }

          matrix='[]'
          while IFS= read -r preset; do
            suffix=$(jq -r --arg p "$preset" '.[$p].suffix // $p' "$PRESET_FILE")
            preset_extra_env=$(jq -r --arg p "$preset" '.[$p].extraEnv // ""' "$PRESET_FILE")

            release_name=$(sanitize_release_name "$suffix")

            matrix=$(jq -c \
              --arg preset_name "$preset" \
              --arg release_name "$release_name" \
              --arg extra_env "$preset_extra_env" \
              '. + [{preset_name:$preset_name, release_name:$release_name, extra_env:$extra_env}]' \
              <<< "$matrix")
          done < <(jq -r 'keys[]' "$PRESET_FILE" | sort)

          if [ "$matrix" = "[]" ]; then
            echo "No presets resolved from file: ${PRESET_FILE}"
            exit 1
          fi

          echo "matrix={\"include\":${matrix}}" >> "$GITHUB_OUTPUT"
  
  

  deploy-matrix-rc-feature:
    runs-on: ubuntu-latest
    needs:
      - prepare-feature-environments
    if: github.ref == 'refs/heads/main'
    environment: uat
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-feature-environments.outputs.matrix) }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Deploy RC feature environment
        id: deploy
        uses: ./.github/actions/deploy_feature_branch
        with:
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: rc-feature
          release-name-override: ${{ matrix.release_name }}
          extra-env: ${{ matrix.extra_env }}

  deploy-staging:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - deploy-uat
      - uat-smoke-test
    environment: staging
    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Deploy staging
        id: deploy_staging
        uses: ./.github/actions/deploy
        with:
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: staging

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Deploy production
        id: deploy_production
        uses: ./.github/actions/deploy
        with:
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: production
