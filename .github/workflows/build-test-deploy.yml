name: Deploy with Helm

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    if: startsWith(github.head_ref || github.ref_name, 'openapi/') == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Build and test
        run: ./gradlew build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Test coverage verification
        run: ./gradlew jacocoTestCoverageVerification

      - name: Integration test
        run: ./gradlew integrationTest

      - name: Publish api models package
        run: |
          version=$(git rev-parse --short HEAD)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            version=${version}-SNAPSHOT
          fi
          ./gradlew :data-access-api:publish -Pversion=$version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload service JAR artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: service-jar
          path: data-access-service/build/libs/*.jar
          retention-days: 1

      - name: Upload mass-generator JAR artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mass-generator-jar
          path: data-access-mass-generator/build/libs/*.jar
          retention-days: 1

      - name: Upload checkstyle report for data-access-service
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: checkstyle-report
          path: data-access-service/build/reports/checkstyle
          retention-days: 14

      - name: Upload test report for data-access-service
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-report
          path: data-access-service/build/reports/tests
          retention-days: 14

      - name: Upload jacoco coverage report for data-access-service
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jacoco-coverage-report
          path: data-access-service/build/reports/jacoco
          retention-days: 14

  vulnerability-scan-app:
    runs-on: ubuntu-latest
    needs:
      - build-test
    permissions:
      contents: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SNYK_TEST_EXCLUDE: build,generated
      SNYK_TARGET_REFERENCE: main
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run Snyk to check app for vulnerabilities
        uses: snyk/actions/gradle@9adf32b1121593767fc3c057af55b55db032dc04 #master
        with:
          command: code test
          args: --severity-threshold=high

  vulnerability-scan-docker:
    runs-on: ubuntu-latest
    needs:
      - build-test
    permissions:
      contents: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Build app jar with gradle
        run: ./gradlew build

      - name: Build local Docker image
        run: |
          docker build -t data-access-service-scan .
          docker save data-access-service-scan -o image.tar

      - name: Run Snyk to scan Docker image from tarball
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 #master
        with:
          image: image.tar
          args: --docker --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  build-push-docker:
    name: build and push docker image
    runs-on: ubuntu-latest
    needs:
      - build-test
    permissions:
      id-token: write
      contents: read
    steps:

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download JAR artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: service-jar
          path: data-access-service/build/libs/

        # ---------- AWS auth (OIDC) ----------
      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@00943011d9042930efac3dcd3a170e4273319bc8 # v5.1.0
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{  vars.ECR_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2
        id: login-ecr
      - name: Build and push a Docker image for data-access-service
        run: |
          docker build --no-cache -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}

  build-push-mass-generator-docker:
    name: build and push mass-generator docker image
    runs-on: ubuntu-latest
    needs:
      - build-test
    permissions:
      id-token: write
      contents: read
    steps:

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download mass-generator JAR artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: mass-generator-jar
          path: data-access-mass-generator/build/libs/

      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@00943011d9042930efac3dcd3a170e4273319bc8 # v5.1.0
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2
        id: login-ecr

      - name: Build and push mass-generator Docker image
        run: |
          docker build --no-cache -f Dockerfile.mass-generator \
            -t $REGISTRY/$REPOSITORY:${IMAGE_TAG}-mass-generator .
          docker push $REGISTRY/$REPOSITORY:${IMAGE_TAG}-mass-generator
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}

  build-push-smoke-test-docker:
    name: build and push smoke-test docker image
    runs-on: ubuntu-latest
    needs:
      - build-test
    permissions:
      id-token: write
      contents: read
    steps:

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@00943011d9042930efac3dcd3a170e4273319bc8 # v5.1.0
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2
        id: login-ecr

      - name: Build and push smoke-test Docker image
        run: |
          docker build --no-cache -f Dockerfile.smoke-test \
            -t $REGISTRY/$REPOSITORY:${IMAGE_TAG}-smoke-test .
          docker push $REGISTRY/$REPOSITORY:${IMAGE_TAG}-smoke-test
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}

  deploy-uat:
    runs-on: ubuntu-latest
    needs:
      - build-push-docker
      - build-push-mass-generator-docker
      - vulnerability-scan-app
      - vulnerability-scan-docker
    environment: uat
    permissions:
      id-token: write
      contents: read
    outputs:
      release-name: ${{ steps.deploy_uat_branch.outputs.release-name }}
      branch-name: ${{ steps.deploy_uat_branch.outputs.branch-name }}

    steps:

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Deploy UAT branch
        id: deploy_uat_branch
        uses: ./.github/actions/deploy_branch
        with:
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: uat

  uat-smoke-test:
    if: startsWith(github.head_ref || github.ref_name, 'openapi/') == false
    runs-on: ubuntu-latest
    needs:
      - deploy-uat
      - build-push-smoke-test-docker
    environment: uat
    permissions:
      id-token: write
      contents: read
    env:
      RELEASE_NAME: ${{ needs.deploy-uat.outputs.release-name }}
      BRANCH_NAME: ${{ needs.deploy-uat.outputs.branch-name }}
      KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Authenticate to the cluster
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@2aa2676c3cd9876ec7037ee8b3d729d0306cb7c6
        with:
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}

      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@00943011d9042930efac3dcd3a170e4273319bc8 # v5.1.0
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2
        id: login-ecr

      - name: Resolve smoke-test configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail
          if [ "$BRANCH_NAME" = "main" ]; then
            echo "db_flavour=rds" >> "$GITHUB_OUTPUT"
            echo "spring_profile=main" >> "$GITHUB_OUTPUT"
          else
            echo "db_flavour=bitnami" >> "$GITHUB_OUTPUT"
            echo "db_postgresql_release=${RELEASE_NAME}-postgresql" >> "$GITHUB_OUTPUT"
            echo "spring_profile=preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy and run smoke tests in cluster
        id: smoke-test
        shell: bash
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          DB_FLAVOUR: ${{ steps.config.outputs.db_flavour }}
          DB_POSTGRESQL_RELEASE: ${{ steps.config.outputs.db_postgresql_release }}
          SPRING_PROFILE: ${{ steps.config.outputs.spring_profile }}
        run: |
          set -euo pipefail
          
          JOB_NAME="${RELEASE_NAME}-smoke-test"
          
          # Delete any existing smoke test job from previous runs
          kubectl -n "$KUBE_NAMESPACE" delete job "$JOB_NAME" --ignore-not-found
          
          # Deploy smoke test job via Helm
          helm upgrade "$JOB_NAME" .helm/smoke-test \
            --namespace "$KUBE_NAMESPACE" \
            --set image.repository="${REGISTRY}/${REPOSITORY}" \
            --set image.tag="${IMAGE_TAG}-smoke-test" \
            --set appReleaseName="${RELEASE_NAME}" \
            --set db.flavour="${DB_FLAVOUR}" \
            --set db.postgresqlReleaseName="${DB_POSTGRESQL_RELEASE}" \
            --set spring.profile="${SPRING_PROFILE}" \
            --install \
            --wait
          
          # Wait for the job pod to be created and start running
          echo "Waiting for smoke test pod to start..."
          kubectl -n "$KUBE_NAMESPACE" wait --for=condition=Ready pod \
            -l "app.kubernetes.io/name=smoke-test,app.kubernetes.io/instance=${JOB_NAME}" \
            --timeout=120s || true
          
          # Get the pod name
          POD_NAME=$(kubectl -n "$KUBE_NAMESPACE" get pod \
            -l "app.kubernetes.io/name=smoke-test,app.kubernetes.io/instance=${JOB_NAME}" \
            -o jsonpath='{.items[0].metadata.name}')
          
          echo "Streaming logs from pod: $POD_NAME"
          
          # Stream logs - this will follow until the container exits
          kubectl -n "$KUBE_NAMESPACE" logs -f "$POD_NAME" || true
          
          # Wait for job completion and capture exit status
          echo "Waiting for job to complete..."
          if kubectl -n "$KUBE_NAMESPACE" wait --for=condition=complete job/"$JOB_NAME" --timeout=1200s; then
            echo "smoke_test_passed=true" >> "$GITHUB_OUTPUT"
            echo "Smoke tests PASSED"
          else
            # Check if it failed rather than timed out
            FAILED=$(kubectl -n "$KUBE_NAMESPACE" get job "$JOB_NAME" -o jsonpath='{.status.failed}')
            if [ "$FAILED" = "1" ]; then
              echo "smoke_test_passed=false" >> "$GITHUB_OUTPUT"
              echo "Smoke tests FAILED"
            else
              echo "smoke_test_passed=false" >> "$GITHUB_OUTPUT"
              echo "Smoke tests TIMED OUT"
            fi
          fi

      - name: Extract test reports from pod
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          
          JOB_NAME="${RELEASE_NAME}-smoke-test"
          
          # Get the pod name (may have completed by now)
          POD_NAME=$(kubectl -n "$KUBE_NAMESPACE" get pod \
            -l "app.kubernetes.io/name=smoke-test,app.kubernetes.io/instance=${JOB_NAME}" \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          
          if [ -n "$POD_NAME" ]; then
            echo "Extracting test reports from pod: $POD_NAME"
            mkdir -p data-access-service/build/reports/tests
            kubectl -n "$KUBE_NAMESPACE" cp \
              "$POD_NAME:/smoke-test/data-access-service/build/reports/tests/infrastructureTest" \
              "data-access-service/build/reports/tests/infrastructureTest" 2>/dev/null || echo "Could not extract reports (pod may have been cleaned up)"
          else
            echo "Pod not found - reports not available"
          fi

      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: uat-smoke-test-report
          path: data-access-service/build/reports/tests/infrastructureTest
          retention-days: 14
          if-no-files-found: warn

      - name: Cleanup smoke test job
        if: always()
        shell: bash
        run: |
          JOB_NAME="${RELEASE_NAME}-smoke-test"
          helm uninstall "$JOB_NAME" --namespace "$KUBE_NAMESPACE" --ignore-not-found || true

      - name: Fail if smoke tests failed
        if: steps.smoke-test.outputs.smoke_test_passed != 'true'
        run: |
          echo "Smoke tests did not pass"
          exit 1

  deploy-staging:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - build-push-docker
      - vulnerability-scan-app
      - vulnerability-scan-docker
      - deploy-uat
    environment: staging
    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Deploy staging
        id: deploy_staging
        uses: ./.github/actions/deploy
        with:
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: staging

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Deploy production
        id: deploy_production
        uses: ./.github/actions/deploy
        with:
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: production
