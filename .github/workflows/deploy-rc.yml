name: Deploy Release Candidate

# Triggered by pushing an RC tag from main (e.g. v1.2.3-rc.1).
# Builds, scans, pushes the Docker image, then deploys to the shared RC environment.
#
# The RC environment is a stable snapshot for client testing before staging.
# For per-feature isolated environments see the workflow_dispatch inputs in ci.yml.
# For staging and production promotion see deploy-release.yml.

on:
  push:
    tags:
      - 'v*-rc.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Never cancel an RC deployment in progress

permissions:
  contents: read

jobs:
  build-and-test:
    uses: ./.github/workflows/build-and-test.yml
    secrets: inherit

  deploy-rc:
    if: github.event.base_ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - build-and-test
    environment: uat
    permissions:
      id-token: write
      contents: read
    steps:

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Deploy RC
        uses: ./.github/actions/deploy_branch
        with:
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: rc
          release-name-override: laa-data-access-api-rc

  smoke-test-rc:
    needs: [deploy-rc]
    uses: ./.github/workflows/smoke-test.yml
    with:
      release-name: laa-data-access-api-rc
      app-environment: rc
    secrets:
      KUBE_CERT: ${{ secrets.KUBE_CERT }}
      KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
      KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
      KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
