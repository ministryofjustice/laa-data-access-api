name: Deploy RC Feature Matrix on Release Candidate Tag

on:
  push:
    tags:
      - 'v-*.*.*-rc.*'

concurrency:
  group: deploy-release-candidate-matrix
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-tag-on-main:
    name: Validate tag is on main branch
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.validate.outputs.commit_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Validate tag commit is ancestor of main
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main:refs/remotes/origin/main

          TAG_SHA=$(git rev-list -n 1 "${{ github.ref }}")
          MAIN_SHA=$(git rev-parse origin/main)

          echo "Tag commit: $TAG_SHA"
          echo "Main branch commit: $MAIN_SHA"

          if git merge-base --is-ancestor "$TAG_SHA" "$MAIN_SHA"; then
            echo "Tag is on main branch (or an ancestor of main)"
            echo "commit_sha=$TAG_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          else
            echo "Tag is NOT on main branch"
            echo "This tag must point to a commit that is reachable from main."
            exit 1
          fi

  resolve-image-metadata:
    runs-on: ubuntu-latest
    needs:
      - validate-tag-on-main
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      image_digest: ${{ steps.resolve.outputs.image_digest }}
    steps:
      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@00943011d9042930efac3dcd3a170e4273319bc8 # v5.1.0
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - name: Resolve pushed image metadata
        id: resolve
        shell: bash
        env:
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ needs.validate-tag-on-main.outputs.commit_sha }}
        run: |
          set -euo pipefail
          DIGEST=$(aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY" \
            --image-ids imageTag="$IMAGE_TAG" \
            --query 'imageDetails[0].imageDigest' \
            --output text)

          if [ -z "$DIGEST" ] || [ "$DIGEST" = "None" ]; then
            echo "Failed to resolve ECR digest for tag: $IMAGE_TAG"
            exit 1
          fi

          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image_digest=$DIGEST" >> "$GITHUB_OUTPUT"

  resolve-presets:
    name: Resolve Environment Presets
    runs-on: ubuntu-latest
    needs:
      - validate-tag-on-main
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Resolve preset matrix
        id: resolve
        shell: bash
        env:
          PRESET_FILE: .github/config/ephemeral-environment-presets.json
        run: |
          set -euo pipefail

          [ -f "$PRESET_FILE" ] || { echo "Missing preset file: $PRESET_FILE"; exit 1; }

          sanitize_release_name() {
            local raw
            local cleaned
            local hash_suffix
            local prefix
            raw="$1"
            cleaned=$(echo "$raw" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9-' '-' | sed 's/^-*//; s/-*$//; s/--*/-/g')
            if [ -z "$cleaned" ]; then
              cleaned="feat-env"
            fi

            if [ ${#cleaned} -gt 53 ]; then
              hash_suffix=$(printf "%s" "$cleaned" | shasum | cut -c1-8)
              prefix=$(printf "%s" "$cleaned" | cut -c1-44 | sed 's/-*$//')
              cleaned="${prefix}-${hash_suffix}"
            fi
            echo "$cleaned"
          }

          matrix='[]'
          while IFS= read -r preset; do
            suffix=$(jq -r --arg p "$preset" '.[$p].suffix // $p' "$PRESET_FILE")
            preset_extra_env=$(jq -r --arg p "$preset" '.[$p].extraEnv // ""' "$PRESET_FILE")

            release_name=$(sanitize_release_name "$suffix")

            matrix=$(jq -c \
              --arg preset_name "$preset" \
              --arg release_name "$release_name" \
              --arg extra_env "$preset_extra_env" \
              '. + [{preset_name:$preset_name, release_name:$release_name, extra_env:$extra_env}]' \
              <<< "$matrix")
          done < <(jq -r 'keys[]' "$PRESET_FILE" | sort)

          if [ "$matrix" = "[]" ]; then
            echo "No presets resolved from file: ${PRESET_FILE}"
            exit 1
          fi

          echo "matrix={\"include\":${matrix}}" >> "$GITHUB_OUTPUT"

  deploy-matrix-rc-feature:
    runs-on: ubuntu-latest
    needs:
      - resolve-presets
      - resolve-image-metadata
    environment: uat
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-presets.outputs.matrix) }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Deploy RC feature environment
        id: deploy
        uses: ./.github/actions/deploy_feature_branch
        with:
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: rc-feature
          image-tag: ${{ needs.resolve-image-metadata.outputs.image_tag }}
          image-digest: ${{ needs.resolve-image-metadata.outputs.image_digest }}
          release-name-override: ${{ matrix.release_name }}
          extra-env: ${{ matrix.extra_env }}
