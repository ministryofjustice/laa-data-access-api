name: Software Composition Analysis - Scheduled Scan (main)

on:
  schedule:
    # Nightly run at midnight (UTC). Adjust as needed.
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: sca-scheduled-main
  cancel-in-progress: false

jobs:
  sca-main:
    name: SCA Scheduled Scan (main)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      pull-requests: write
      security-events: write
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Software Composition Analysis (with Renovate)
        uses: ./.github/actions/sca
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          renovate: "true"
          codeql-upload-findings: "always"


