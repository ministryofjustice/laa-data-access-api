name: Deploy Feature Flagged Environment

on:
  # Temporary PR trigger for POC testing.
  # Comment out or remove this pull_request block before merging.
#  pull_request:
#    types:
#      - opened
#      - reopened
#      - synchronize
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  base-resolve-presets:
    name: Resolve Environment Presets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Resolve preset matrix
        id: resolve
        shell: bash
        env:
          PRESET_FILE: .github/config/ephemeral-environment-presets.json
        run: |
          set -euo pipefail

          [ -f "$PRESET_FILE" ] || { echo "Missing preset file: $PRESET_FILE"; exit 1; }

          sanitize_release_name() {
            local raw
            local cleaned
            local hash_suffix
            local prefix
            raw="$1"
            cleaned=$(echo "$raw" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9-' '-' | sed 's/^-*//; s/-*$//; s/--*/-/g')
            if [ -z "$cleaned" ]; then
              cleaned="feat-env"
            fi

            if [ ${#cleaned} -gt 53 ]; then
              hash_suffix=$(printf "%s" "$cleaned" | shasum | cut -c1-8)
              prefix=$(printf "%s" "$cleaned" | cut -c1-44 | sed 's/-*$//')
              cleaned="${prefix}-${hash_suffix}"
            fi
            echo "$cleaned"
          }

          matrix='[]'
          while IFS= read -r preset; do
            suffix=$(jq -r --arg p "$preset" '.[$p].suffix // $p' "$PRESET_FILE")
            preset_extra_env=$(jq -r --arg p "$preset" '.[$p].extraEnv // ""' "$PRESET_FILE")

            release_name=$(sanitize_release_name "$suffix")

            matrix=$(jq -c \
              --arg preset_name "$preset" \
              --arg release_name "$release_name" \
              --arg extra_env "$preset_extra_env" \
              '. + [{preset_name:$preset_name, release_name:$release_name, extra_env:$extra_env}]' \
              <<< "$matrix")
          done < <(jq -r 'keys[]' "$PRESET_FILE" | sort)

          if [ "$matrix" = "[]" ]; then
            echo "No presets resolved from file: ${PRESET_FILE}"
            exit 1
          fi

          echo "matrix={\"include\":${matrix}}" >> "$GITHUB_OUTPUT"

  base-build-test:
    runs-on: ubuntu-latest
    needs: base-resolve-presets
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Build and test
        run: ./gradlew build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Integration test
        run: ./gradlew integrationTest

      - name: Upload service JAR artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: service-jar
          path: data-access-service/build/libs/*.jar
          retention-days: 1


  base-build-push-docker:
    runs-on: ubuntu-latest
    needs:
      - base-resolve-presets
      - base-build-test
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download JAR artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: service-jar
          path: data-access-service/build/libs/

      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@00943011d9042930efac3dcd3a170e4273319bc8 # v5.1.0
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2
        id: login-ecr

      - name: Build and push Docker image
        run: |
          docker build --no-cache -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}

  deploy-matrix-rc-feature:
    runs-on: ubuntu-latest
    needs:
      - base-resolve-presets
      - base-build-push-docker
    environment: uat
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.base-resolve-presets.outputs.matrix) }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Deploy RC feature environment
        id: deploy
        uses: ./.github/actions/deploy_feature_branch
        with:
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: rc-feature
          release-name-override: ${{ matrix.release_name }}
          extra-env: ${{ matrix.extra_env }}

      - name: Run smoke tests
        uses: ./.github/actions/smoke-test
        with:
          release-name: ${{ steps.deploy.outputs.release-name }}
          branch-name: ${{ matrix.release_name }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          report-name: rc-feature-smoke-test-${{ matrix.preset_name }}
