name: Deploy Mass Generator

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - uat
          - staging
          - production
      git-ref:
        description: 'Git reference (branch, tag, or commit SHA)'
        required: false
        default: main
  pull_request:
    types:
      - labeled
      - unlabeled
      - opened
      - reopened

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-label:
    name: Check if mass-generator-required label is present
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.check.outputs.should-deploy }}
    steps:
      - name: Check label or manual trigger
        id: check
        shell: bash
        run: |
          # If manual dispatch, always deploy
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should-deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          # If PR event, check for label
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [[ "${{ github.event.pull_request.labels.*.name }}" == *"mass-generator-required"* ]]; then
              echo "should-deploy=true" >> "$GITHUB_OUTPUT"
            else
              echo "should-deploy=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi
          
          # Otherwise don't deploy
          echo "should-deploy=false" >> "$GITHUB_OUTPUT"

  build-push-mass-generator-docker:
    name: Build and push mass-generator docker image
    if: needs.check-label.outputs.should-deploy == 'true'
    runs-on: ubuntu-latest
    needs:
      - check-label
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.inputs.git-ref }}

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Build mass-generator
        run: ./gradlew :data-access-mass-generator:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload mass-generator JAR artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mass-generator-jar
          path: data-access-mass-generator/build/libs/*.jar
          retention-days: 1

      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@00943011d9042930efac3dcd3a170e4273319bc8 # v5.1.0
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2
        id: login-ecr

      - name: Build and push mass-generator Docker image
        run: |
          docker build --no-cache -f Dockerfile.mass-generator \
            -t $REGISTRY/$REPOSITORY:${IMAGE_TAG}-mass-generator .
          docker push $REGISTRY/$REPOSITORY:${IMAGE_TAG}-mass-generator
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}

  deploy-mass-generator-uat:
    if: |
      needs.check-label.outputs.should-deploy == 'true' &&
      (github.event_name == 'pull_request' ||
       github.event.inputs.environment == 'uat')
    name: Deploy mass-generator to UAT
    runs-on: ubuntu-latest
    needs:
      - check-label
      - build-push-mass-generator-docker
    environment: uat
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.inputs.git-ref }}

      - name: Get release name for PR
        id: get-release
        uses: ./.github/actions/get_release_name
        if: github.event_name == 'pull_request'

      - name: Deploy mass-generator
        uses: ./.github/actions/deploy_mass_generator
        with:
          environment: uat
          release-name: ${{ github.event_name == 'pull_request' && steps.get-release.outputs.release-name || 'laa-data-access-api-uat' }}
          image-tag: ${{ github.sha }}
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          spring-profile: ${{ github.event_name == 'pull_request' && 'preview' || 'unsecured' }}
          db-postgresql-release: ${{ github.event_name == 'pull_request' && format('{0}-postgresql', steps.get-release.outputs.release-name) || 'laa-data-access-api-uat-postgresql' }}

  deploy-mass-generator-staging:
    if: |
      needs.check-label.outputs.should-deploy == 'true' &&
      github.event.inputs.environment == 'staging'
    name: Deploy mass-generator to Staging
    runs-on: ubuntu-latest
    needs:
      - check-label
      - build-push-mass-generator-docker
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.inputs.git-ref }}

      - name: Deploy mass-generator
        uses: ./.github/actions/deploy_mass_generator
        with:
          environment: staging
          release-name: laa-data-access-api
          image-tag: ${{ github.sha }}
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          spring-profile: unsecured
          db-postgresql-release: laa-data-access-api-postgresql

  deploy-mass-generator-production:
    if: |
      needs.check-label.outputs.should-deploy == 'true' &&
      github.event.inputs.environment == 'production'
    name: Deploy mass-generator to Production
    runs-on: ubuntu-latest
    needs:
      - check-label
      - build-push-mass-generator-docker
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.inputs.git-ref }}

      - name: Deploy mass-generator
        uses: ./.github/actions/deploy_mass_generator
        with:
          environment: production
          release-name: laa-data-access-api
          image-tag: ${{ github.sha }}
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          spring-profile: main
          db-postgresql-release: laa-data-access-api-postgresql

