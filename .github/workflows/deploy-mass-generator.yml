name: Deploy Mass Generator

on:
  workflow_dispatch:
    inputs:
      git-ref:
        description: 'Git reference (branch, tag, or commit SHA)'
        required: false
        default: main
  pull_request:
    types:
      - labeled

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-label:
    name: Check if mass-generator deployment is required
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.check.outputs.should-deploy }}
      target: ${{ steps.check.outputs.target }}
    steps:
      - name: Determine deployment target
        id: check
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should-deploy=true" >> "$GITHUB_OUTPUT"
            echo "target=uat" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            # Check if the mass-generator-required label was specifically added
            added_label='${{ github.event.action }}'
            label_name='${{ github.event.label.name }}'
          
            if [ "$added_label" = "labeled" ] && [ "$label_name" = "mass-generator-required" ]; then
              echo "should-deploy=true" >> "$GITHUB_OUTPUT"
              echo "target=ephemeral" >> "$GITHUB_OUTPUT"
            else
              echo "should-deploy=false" >> "$GITHUB_OUTPUT"
              echo "target=none" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "should-deploy=false" >> "$GITHUB_OUTPUT"
            echo "target=none" >> "$GITHUB_OUTPUT"
          fi


  build-push-mass-generator-docker:
    name: Build and push mass-generator docker image
    if: needs.check-label.outputs.should-deploy == 'true'
    runs-on: ubuntu-latest
    needs:
      - check-label
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.inputs.git-ref || github.sha }}

      - name: Setup build environment
        uses: ./.github/actions/setup_build_environment
        id: build-env
        with:
          setup-ecr: true
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}

      - name: Build mass-generator
        run: ./gradlew :data-access-mass-generator:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push mass-generator Docker image
        run: |
          docker build --no-cache -f Dockerfile.mass-generator \
            -t $REGISTRY/$REPOSITORY:${IMAGE_TAG}-mass-generator .
          docker push $REGISTRY/$REPOSITORY:${IMAGE_TAG}-mass-generator
        env:
          REGISTRY: ${{ steps.build-env.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}

  deploy-mass-generator-uat:
    name: Deploy mass-generator to UAT
    if: needs.check-label.outputs.target == 'uat'
    runs-on: ubuntu-latest
    needs:
      - check-label
      - build-push-mass-generator-docker
    environment: uat
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.inputs.git-ref }}

      - name: Deploy mass-generator
        uses: ./.github/actions/deploy_mass_generator
        with:
          environment: uat
          release-name: laa-data-access-api-uat
          image-tag: ${{ github.sha }}
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          spring-profile: unsecured
          db-postgresql-release: laa-data-access-api-uat-postgresql

  deploy-mass-generator-ephemeral:
    name: Deploy mass-generator to ephemeral environment
    if: needs.check-label.outputs.target == 'ephemeral'
    runs-on: ubuntu-latest
    needs:
      - check-label
      - build-push-mass-generator-docker
    environment: uat
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Get release name
        id: get-release
        uses: ./.github/actions/get_release_name

      - name: Deploy mass-generator
        uses: ./.github/actions/deploy_mass_generator
        with:
          environment: uat
          release-name: ${{ steps.get-release.outputs.release-name }}
          image-tag: ${{ github.sha }}
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          spring-profile: preview
          db-postgresql-release: ${{ steps.get-release.outputs.release-name }}-postgresql
