name: Deploy Mass Generator

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - uat
          - staging
          - production
      git-ref:
        description: 'Git reference (branch, tag, or commit SHA)'
        required: false
        default: main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-push-mass-generator-docker:
    name: Build and push mass-generator docker image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.inputs.git-ref }}

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Build mass-generator
        run: ./gradlew :data-access-mass-generator:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload mass-generator JAR artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mass-generator-jar
          path: data-access-mass-generator/build/libs/*.jar
          retention-days: 1

      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@00943011d9042930efac3dcd3a170e4273319bc8 # v5.1.0
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2
        id: login-ecr

      - name: Build and push mass-generator Docker image
        run: |
          docker build --no-cache -f Dockerfile.mass-generator \
            -t $REGISTRY/$REPOSITORY:${IMAGE_TAG}-mass-generator .
          docker push $REGISTRY/$REPOSITORY:${IMAGE_TAG}-mass-generator
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}

  deploy-mass-generator-uat:
    if: github.event.inputs.environment == 'uat'
    name: Deploy mass-generator to UAT
    runs-on: ubuntu-latest
    needs:
      - build-push-mass-generator-docker
    environment: uat
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.inputs.git-ref }}

      - name: Authenticate to the cluster
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@2aa2676c3cd9876ec7037ee8b3d729d0306cb7c6
        with:
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}

      - name: Assume role in Cloud Platform
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - name: Docker login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2
        with:
          mask-password: 'true'

      - name: Deploy mass-generator to UAT
        shell: bash
        env:
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          ECR_REGION: ${{ vars.ECR_REGION }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          GIT_SHA: ${{ github.sha }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
        run: |
          RELEASE_NAME="laa-data-access-api-uat"
          SPRING_PROFILE="unsecured"
          
          helm upgrade ${RELEASE_NAME}-mass-generator .helm/mass-generator \
            --namespace ${KUBE_NAMESPACE} \
            --set image.repository="${ECR_REGISTRY}/${ECR_REPOSITORY}" \
            --set image.tag="${GIT_SHA}-mass-generator" \
            --set spring.profile="${SPRING_PROFILE}" \
            --set db.postgresqlReleaseName="${RELEASE_NAME}-postgresql" \
            --set replicaCount=1 \
            --install \
            --wait

  deploy-mass-generator-staging:
    if: github.event.inputs.environment == 'staging'
    name: Deploy mass-generator to Staging
    runs-on: ubuntu-latest
    needs:
      - build-push-mass-generator-docker
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.inputs.git-ref }}

      - name: Authenticate to the cluster
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@2aa2676c3cd9876ec7037ee8b3d729d0306cb7c6
        with:
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}

      - name: Assume role in Cloud Platform
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - name: Docker login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2
        with:
          mask-password: 'true'

      - name: Deploy mass-generator to Staging
        shell: bash
        env:
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          ECR_REGION: ${{ vars.ECR_REGION }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          GIT_SHA: ${{ github.sha }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
        run: |
          RELEASE_NAME="laa-data-access-api"
          SPRING_PROFILE="unsecured"
          
          helm upgrade ${RELEASE_NAME}-mass-generator .helm/mass-generator \
            --namespace ${KUBE_NAMESPACE} \
            --set image.repository="${ECR_REGISTRY}/${ECR_REPOSITORY}" \
            --set image.tag="${GIT_SHA}-mass-generator" \
            --set spring.profile="${SPRING_PROFILE}" \
            --set db.postgresqlReleaseName="${RELEASE_NAME}-postgresql" \
            --set replicaCount=1 \
            --install \
            --wait

  deploy-mass-generator-production:
    if: github.event.inputs.environment == 'production'
    name: Deploy mass-generator to Production
    runs-on: ubuntu-latest
    needs:
      - build-push-mass-generator-docker
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.inputs.git-ref }}

      - name: Authenticate to the cluster
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@2aa2676c3cd9876ec7037ee8b3d729d0306cb7c6
        with:
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}

      - name: Assume role in Cloud Platform
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - name: Docker login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2
        with:
          mask-password: 'true'

      - name: Deploy mass-generator to Production
        shell: bash
        env:
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          ECR_REGION: ${{ vars.ECR_REGION }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          GIT_SHA: ${{ github.sha }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
        run: |
          RELEASE_NAME="laa-data-access-api"
          SPRING_PROFILE="main"
          
          helm upgrade ${RELEASE_NAME}-mass-generator .helm/mass-generator \
            --namespace ${KUBE_NAMESPACE} \
            --set image.repository="${ECR_REGISTRY}/${ECR_REPOSITORY}" \
            --set image.tag="${GIT_SHA}-mass-generator" \
            --set spring.profile="${SPRING_PROFILE}" \
            --set db.postgresqlReleaseName="${RELEASE_NAME}-postgresql" \
            --set replicaCount=1 \
            --install \
            --wait

