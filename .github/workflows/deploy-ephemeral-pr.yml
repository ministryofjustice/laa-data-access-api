name: Deploy Ephemeral PR Environment

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    # Skip OpenAPI-only branches (automated spec generation, no code changes)
    if: startsWith(github.head_ref || github.ref_name, 'openapi/') == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up JDK 25
        # JDK 25 is intentional for this project.
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5
        with:
          gradle-home-cache-cleanup: true

      - name: Build and test
        run: ./gradlew build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Integration test
        run: ./gradlew integrationTest

# TODO: Re-enable once failing tests are fixed (tracked in backlog)
#      - name: Test coverage verification
#        run: ./gradlew jacocoTestCoverageVerification

      - name: Publish api models package
        run: |
          version=$(git rev-parse --short HEAD)-SNAPSHOT
          ./gradlew :data-access-api:publish -Pversion=$version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload service JAR artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: service-jar-${{ github.run_id }}
          path: data-access-service/build/libs/*.jar
          retention-days: 1

      - name: Upload mass-generator JAR artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mass-generator-jar-${{ github.run_id }}
          path: data-access-mass-generator/build/libs/*.jar
          retention-days: 1

  vulnerability-scan-app:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - build-test
    permissions:
      contents: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SNYK_TEST_EXCLUDE: build,generated
      SNYK_TARGET_REFERENCE: main
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run Snyk to check app for vulnerabilities
        uses: snyk/actions/gradle@9adf32b1121593767fc3c057af55b55db032dc04 # pinned SHA
        with:
          command: code test
          args: --severity-threshold=high

  vulnerability-scan-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - build-test
    permissions:
      contents: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download service JAR artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: service-jar-${{ github.run_id }}
          path: data-access-service/build/libs/

      - name: Build local Docker image
        run: |
          docker build -t data-access-service-scan .
          docker save data-access-service-scan -o image.tar

      - name: Run Snyk to scan Docker image from tarball
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 # pinned SHA
        with:
          image: image.tar
          args: --docker --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  build-push-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - build-test
      - vulnerability-scan-app
      - vulnerability-scan-docker
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download service JAR artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: service-jar-${{ github.run_id }}
          path: data-access-service/build/libs/

      - name: Build and push Docker image
        uses: ./.github/actions/build_and_push
        with:
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}

  build-push-mass-generator-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - build-test
      - vulnerability-scan-app
      - vulnerability-scan-docker
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download mass-generator JAR artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: mass-generator-jar-${{ github.run_id }}
          path: data-access-mass-generator/build/libs/

      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@00943011d9042930efac3dcd3a170e4273319bc8 # v5.1.0
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2
        id: login-ecr

      - name: Build and push mass-generator Docker image
        run: |
          docker build --no-cache -f Dockerfile.mass-generator \
            -t $REGISTRY/$REPOSITORY:${IMAGE_TAG}-mass-generator .
          docker push $REGISTRY/$REPOSITORY:${IMAGE_TAG}-mass-generator
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}

  deploy-ephemeral:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - build-push-docker
      - build-push-mass-generator-docker
      - vulnerability-scan-app
      - vulnerability-scan-docker
    environment: uat
    permissions:
      id-token: write
      contents: read
    outputs:
      release-name: ${{ steps.deploy_ephemeral.outputs.release-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Deploy ephemeral PR environment
        id: deploy_ephemeral
        uses: ./.github/actions/deploy-ephemeral-release
        with:
          ecr-region: ${{ vars.ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: uat


  uat-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - deploy-ephemeral
    environment: uat
    permissions:
      id-token: write
      contents: read
    env:
      RELEASE_NAME: ${{ needs.deploy-ephemeral.outputs.release-name }}
      KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up JDK 25
        # JDK 25 is intentional for this project.
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5
        with:
          gradle-home-cache-cleanup: true

      - name: Authenticate to the cluster
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@2aa2676c3cd9876ec7037ee8b3d729d0306cb7c6
        with:
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}

      - name: Resolve smoke-test target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          echo "db_pod_selector=app.kubernetes.io/instance=${RELEASE_NAME}-postgresql,app.kubernetes.io/name=postgresql" >> "$GITHUB_OUTPUT"
          echo "db_secret=${RELEASE_NAME}-postgresql" >> "$GITHUB_OUTPUT"
          echo "db_flavour=bitnami" >> "$GITHUB_OUTPUT"
          echo "app_pod_selector=app.kubernetes.io/instance=${RELEASE_NAME},app.kubernetes.io/name=data-access-api" >> "$GITHUB_OUTPUT"

      - name: Port forward to Postgres
        uses: ./.github/actions/port-forward
        with:
          kube_namespace: ${{ secrets.KUBE_NAMESPACE }}
          pod_selector: ${{ steps.target.outputs.db_pod_selector }}
          local_port: "5432"
          remote_port: "5432"
          pid_env_var: DB_PORT_FORWARD_PID

      - name: Port forward to app
        uses: ./.github/actions/port-forward
        with:
          kube_namespace: ${{ secrets.KUBE_NAMESPACE }}
          pod_selector: ${{ steps.target.outputs.app_pod_selector }}
          local_port: "8080"
          remote_port: "8080"
          pid_env_var: APP_PORT_FORWARD_PID

      - name: Configure smoke-test environment
        shell: bash
        env:
          DB_SECRET: ${{ steps.target.outputs.db_secret }}
          DB_FLAVOUR: ${{ steps.target.outputs.db_flavour }}
        run: |
          set -euo pipefail
          decode() {
            kubectl -n "$KUBE_NAMESPACE" get secret "$DB_SECRET" -o jsonpath="{.data.$1}" | base64 -d
          }
          if [ "$DB_FLAVOUR" = "bitnami" ]; then
            DB_NAME="postgres"
            DB_USER="postgres"
            DB_PASS=$(decode postgres-password)
          else
            DB_NAME=$(decode database_name)
            DB_USER=$(decode database_username)
            DB_PASS=$(decode database_password)
          fi
          echo "::add-mask::$DB_PASS"
          {
            echo "LAA_SMOKE_ACCESS_API_URL=http://localhost:8080"
            echo "LAA_SMOKE_ACCESS_DB_URL=jdbc:postgresql://localhost:5432/$DB_NAME"
            echo "LAA_SMOKE_ACCESS_DB_USERNAME=$DB_USER"
            echo "LAA_SMOKE_ACCESS_DB_PASSWORD=$DB_PASS"
          } >> "$GITHUB_ENV"

      - name: Run UAT smoke tests
        run: ./gradlew :data-access-service:infrastructureTest --continue --console=plain
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: uat-smoke-test-report-${{ github.run_id }}
          path: data-access-service/build/reports/tests/infrastructureTest
          retention-days: 14

      - name: Stop port-forwards
        if: always()
        shell: bash
        run: |
          for pid in "${DB_PORT_FORWARD_PID:-}" "${APP_PORT_FORWARD_PID:-}"; do
            if [ -n "$pid" ]; then
              if kill "$pid" 2>/dev/null; then
                echo "Stopped port-forward PID $pid"
              else
                echo "Warning: Could not stop PID $pid (may already be stopped)"
              fi
            fi
          done

      - name: Delete in-cluster port-forward resources
        if: always()
        shell: bash
        run: |
          kubectl -n "$KUBE_NAMESPACE" delete deployment port-forward-pod --ignore-not-found
          kubectl -n "$KUBE_NAMESPACE" delete service laa-data-access-api-uat-postgresql-portforward --ignore-not-found
