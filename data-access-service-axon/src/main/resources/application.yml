server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: data-access-service-axon
  autoconfigure:
    exclude: org.axonframework.springboot.autoconfig.XStreamAutoConfiguration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/laa_data_access_api?currentSchema=axon}
    username: ${SPRING_DATASOURCE_USERNAME:laa_user}
    password: ${SPRING_DATASOURCE_PASSWORD:laa_password}
  flyway:
    create-schemas: true
    default-schema: axon
    schemas: axon
  jpa:
    database-platform: uk.gov.justice.laa.dstew.access.config.ByteaEnforcedPostgresSqlDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: axon

axon:
  axonserver:
    enabled: false
  serializer:
    general: jackson
    events: jackson
    messages: jackson
  eventhandling:
    processors:
      application-projection:
        mode: tracking
      application-history-projection:
        mode: tracking
      linked-application-group-projection:
        mode: tracking

application:
  projection:
    timeout: 5s

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  api-docs:
    version: openapi_3_1
