plugins {
    id 'io.freefair.lombok' version '8.13.1'
    id 'uk.gov.laa.springboot.laa-spring-boot-gradle-plugin'
}

configurations.all {
    resolutionStrategy.eachDependency { details ->
        if (details.requested.group == 'org.springframework' && details.requested.module.name in ['spring-web', 'spring-webflux', 'spring-webmvc']) {
            details.useVersion '7.0.7'
            details.because 'Security fix: override strict BOM constraint to 7.0.7'
        }
    }
}

java {
    withJavadocJar()
    withSourcesJar()
}

jar {
    enabled = true
}

bootJar.enabled = false
bootRun.enabled = false
tasks.named('bootBuildImage') { enabled = false }

repositories {
    mavenCentral()
}

dependencies {
    implementation('org.springframework.boot:spring-boot-starter-web') {
        exclude group: 'com.google.code.gson', module: 'gson'
    }

    implementation 'org.springframework:spring-aspects'
    implementation 'org.springframework.security:spring-security-core:7.0.2'
    implementation 'org.springframework:spring-core:6.2.11'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}
