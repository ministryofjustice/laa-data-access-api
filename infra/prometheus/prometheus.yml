global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: laa-data-access-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080
        labels:
          release: local
          namespace: local
          container: data-access-api
